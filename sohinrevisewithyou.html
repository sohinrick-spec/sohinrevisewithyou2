/* 預建所有可選章節清單，避免每次 render 重建 */
const ALL_CHAPTERS = (() => {
  const arr = [];
  for (let i = CONFIG.CHAPTER_RANGE.start; i <= CONFIG.CHAPTER_RANGE.end; i++) arr.push(i);
  return arr;
})();

/* ============================================================================
 * 【區塊 2】UTILITIES
 * ============================================================================ */

const { useState, useEffect, useMemo, useRef, useCallback, useContext, createContext, memo } = React;
const MotionLib = window.Motion || { motion: { div: 'div' }, AnimatePresence: ({children}) => children };
const { motion, AnimatePresence } = MotionLib;

function formatText(text) {
  if (text === null || text === undefined) return '';
  return String(text)
    .replace(/\\r\\n/g, '\n')
    .replace(/\\n/g, '\n')
    .replace(/\\t/g, '    ');
}

function decodeJwtResponse(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(
    atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
  );
  return JSON.parse(jsonPayload);
}

function getHKDateString(dateObj) {
  const baseDate = dateObj || new Date();
  const utc = baseDate.getTime() + (baseDate.getTimezoneOffset() * 60000);
  const hk = new Date(utc + (3600000 * 8));
  const y = hk.getFullYear();
  const m = String(hk.getMonth() + 1).padStart(2, '0');
  const d = String(hk.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatTime(ms) {
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function getQuestionId(q) {
  if (!q) return null;
  if (q.id !== undefined && q.id !== null && q.id !== '') return String(q.id);
  const title = q.title || q.question || '';
  const cat = q.category || '';
  if (!title) return null;
  return `${cat}::${String(title).slice(0, 80)}`;
}

function shortenName(fullName) {
  if (!fullName) return '';
  return String(fullName)
    .replace(/^\s*[4-6][A-Z]\d+\s*/i, '')
    .replace(/\s*\([\d\-]+\)(\s*[A-Za-z0-9]+)?\s*$/, '')
    .trim();
}

function getStudentForm(fullName) {
  if (!fullName) return null;
  const match = String(fullName).match(/([4-6])[A-Z]\d+/i);
  return match ? match[1] : null;
}

function normalizeNameForMatch(name) {
  if (!name) return '';
  return shortenName(name)
    .toLowerCase()
    .trim()
    .split(/\s+/)
    .filter(Boolean)
    .sort()
    .join(' ');
}

/* 預先正規化老師名稱清單（模組載入時一次） */
const TEACHER_NORMALIZED_SET = new Set(CONFIG.TEACHER_NAMES.map(normalizeNameForMatch));

function isTeacher(name) {
  if (!name || name === '訪客 (未登入)') return false;
  const normalized = normalizeNameForMatch(name);
  if (!normalized) return false;
  return TEACHER_NORMALIZED_SET.has(normalized);
}

function getWeekStartHK(dateObj) {
  const baseDate = dateObj || new Date();
  const utc = baseDate.getTime() + (baseDate.getTimezoneOffset() * 60000);
  const hk = new Date(utc + (3600000 * 8));
  const day = hk.getDay();
  const diff = day === 0 ? 6 : day - 1;
  hk.setDate(hk.getDate() - diff);
  const y = hk.getFullYear();
  const m = String(hk.getMonth() + 1).padStart(2, '0');
  const d = String(hk.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

const BATTLE_STD_TIME_PER_Q_MS = 30 * 1000;

function parseScopeCount(scopeStr) {
  if (!scopeStr || typeof scopeStr !== 'string' || !scopeStr.trim()) return 1;
  const parts = scopeStr.split('|');
  let count = 0;
  parts.forEach(p => {
    const items = p.trim().split(',').filter(s => s.trim().length > 0);
    count += items.length;
  });
  return Math.max(1, count);
}

function parseScopeChapters(scopeStr) {
  if (!scopeStr || typeof scopeStr !== 'string') return [];
  return scopeStr.split('|').flatMap(p =>
    p.split(',').map(s => s.trim()).filter(Boolean)
  );
}

function calculateBattlePoint(correct, total, timeMs, scopeStr) {
  if (!total || total <= 0 || correct < 0) return 0;
  const baseScore      = correct * 100;
  const accuracy       = correct / total;
  const numCourses     = parseScopeCount(scopeStr);
  const scopeMultiplier = 1 + (numCourses - 1) * 0.15;
  const avgTimePerQMs  = timeMs / total;
  const speedMultiplier = avgTimePerQMs <= 0
    ? 1.5
    : Math.min(1.5, Math.max(1.0, BATTLE_STD_TIME_PER_Q_MS / avgTimePerQMs));
  return Math.round(baseScore * accuracy * scopeMultiplier * speedMultiplier);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function safeDateStr(raw) {
  try {
    const d = new Date(raw);
    if (!isNaN(d.getTime())) return getHKDateString(d);
    return String(raw).split('T')[0];
  } catch (e) {
    return "";
  }
}

/* 🆕 共用 helper：解析一筆紀錄的 score/total 並做範圍驗證
 * 原本在 computeChapterStats / computeDailyAccuracy / StatsScreen / TeacherStatsScreen 各自都寫一次，
 * 現在統一使用，避免邏輯偏差。 */
function parseScoreTotal(r) {
  const score = parseFloat(String(r[2] || '0').replace(/[^\d.]/g, '').trim()) || 0;
  const total = parseFloat(String(r[3] || '0').replace(/[^\d.]/g, '').trim()) || 0;
  if (total <= 0 || score < 0 || score > total) return null;
  return { score, total };
}

function getLevelInfo(totalQuestions) {
  const { baseXp, increment, maxLevel } = CONFIG.LEVEL;
  let level = 1;
  let currentBoundary = 0;
  let nextBoundary = baseXp;

  while (totalQuestions >= nextBoundary && level < maxLevel) {
    level++;
    currentBoundary = nextBoundary;
    nextBoundary += baseXp + (level - 1) * increment;
  }

  const currentExp = totalQuestions - currentBoundary;
  const expNeeded = nextBoundary - currentBoundary;
  const progressPercent = level >= maxLevel ? 100 : Math.round((currentExp / expNeeded) * 100);
  const questionsToNextLevel = nextBoundary - totalQuestions;

  const tier = LEVEL_TITLES.find(t => level >= t.min);
  const titleName = tier ? tier.name : '生物新手';

  return {
    level,
    title: `Lv.${level} ${titleName}`,
    currentExp,
    expNeeded,
    progressPercent,
    questionsToNextLevel
  };
}

function parseUserData(userArr) {
  if (!userArr) return null;
  const base = {
    name: userArr[0],
    totalQuestions: parseInt(userArr[1]) || 0,
    lastLogin: userArr[2],
    storedStreak: parseInt(userArr[3]) || 0,
    coins: parseInt(userArr[4]) || 0,
  };
  SHOP_ITEMS.forEach(item => {
    base[item.userField] = parseInt(userArr[item.col]) || 0;
  });
  return base;
}

function findUser(leaderboardData, userName) {
  const shortTarget = shortenName(userName);
  const u = leaderboardData?.users?.find(row => shortenName(String(row[0] || '').trim()) === shortTarget);
  return parseUserData(u);
}

function calculateActiveStreak(user, todayStr, yesterdayStr) {
  if (!user) return 0;
  const lastStr = safeDateStr(user.lastLogin);
  if (!lastStr) return 0;

  if (lastStr === todayStr || lastStr === yesterdayStr) return user.storedStreak;

  const [ty, tm, td] = todayStr.split("-").map(Number);
  const [ly, lm, ld] = lastStr.split("-").map(Number);
  if (!ly) return 0;
  const dToday = new Date(ty, tm - 1, td);
  const dLast  = new Date(ly, lm - 1, ld);
  const diffDays = Math.round(Math.abs(dToday - dLast) / (1000 * 3600 * 24));
  if (diffDays > 1 && user.shields >= (diffDays - 1)) return user.storedStreak;
  return 0;
}

function filterTodayMCQRecords(records, todayStr) {
  if (!records) return [];
  return records
    .filter(r => {
      const name = String(r[1] || "").trim();
      if (!name || name === "訪客 (未登入)" || name === "Guest") return false;
      const mode = String(r[6] || "").toLowerCase();
      if (!mode.includes('mc')) return false;
      const rowDateStr = String(r[7] || "").trim();
      if (rowDateStr === todayStr) return true;
      try {
        return r[0] && getHKDateString(new Date(r[0])) === todayStr;
      } catch (e) { return false; }
    })
    .map(r => {
      const acc   = Number(r[5]);
      const time  = Number(r[4]);
      const total = Number(r[3]) || CONFIG.QUESTIONS_PER_SESSION;
      const score = Number(r[2]) || Math.round(acc / 100 * total);
      const scope = String(r[8] || '');
      const battlePoint = calculateBattlePoint(score, total, time, scope);
      return { name: String(r[1]).trim(), acc, time, score, total, scope, battlePoint };
    });
}

function computeRankings(leaderboardData, currentUserName, currentRunRecord) {
  const records = leaderboardData?.records || [];
  const users   = leaderboardData?.users   || [];
  const todayStr  = getHKDateString();
  const weekStart = getWeekStartHK();

  const userTotalMap = new Map();
  users.forEach(u => {
    if (u[0]) userTotalMap.set(u[0], parseInt(u[1]) || 0);
  });

  let candidates = filterTodayMCQRecords(records, todayStr);
  if (currentRunRecord) candidates.push(currentRunRecord);

  const dailyMap = new Map();
  candidates.forEach(rec => {
    const old = dailyMap.get(rec.name);
    if (!old || rec.battlePoint > old.battlePoint) dailyMap.set(rec.name, rec);
  });

  const daily = Array.from(dailyMap.values())
    .map(r => ({ ...r, totalQuestions: userTotalMap.get(r.name) || 0 }))
    .sort((a, b) => b.battlePoint - a.battlePoint)
    .slice(0, 20);

  const weeklyMap = new Map();
  records.forEach(r => {
    const name = String(r[1] || "").trim();
    if (!name || name === "訪客 (未登入)" || name === "Guest") return;
    const mode = String(r[6] || "").toLowerCase();
    if (!mode.includes('mc')) return;

    let rowDateStr = String(r[7] || "").trim();
    if (!rowDateStr) {
      try { rowDateStr = getHKDateString(new Date(r[0])); } catch (e) { return; }
    }
    if (!rowDateStr || rowDateStr < weekStart) return;

    const score = Number(r[2]) || 0;
    weeklyMap.set(name, (weeklyMap.get(name) || 0) + score);
  });

  if (currentRunRecord && currentRunRecord.name !== "訪客 (未登入)" && currentRunRecord.name !== "Guest") {
    weeklyMap.set(
      currentRunRecord.name,
      (weeklyMap.get(currentRunRecord.name) || 0) + (currentRunRecord.score || 0)
    );
  }

  const weeklyRank = Array.from(weeklyMap.entries())
    .map(([name, correctCount]) => ({
      name,
      correctCount,
      totalQuestions: userTotalMap.get(name) || 0
    }))
    .sort((a, b) => b.correctCount - a.correctCount || b.totalQuestions - a.totalQuestions)
    .slice(0, 20);

  return { daily, weeklyRank, todayStr, weekStart };
}

function getStudentRecords(records, userName) {
  if (!records || !userName) return [];
  const targetRaw = String(userName).trim();
  const targetShort = shortenName(targetRaw);
  return records.filter(r => {
    const rawName = String(r[1] || '').trim();
    const shortName = shortenName(rawName);
    const sameUser =
      rawName === targetRaw ||
      shortName === targetShort;
    if (!sameUser) return false;
    const mode = String(r[6] || '').toLowerCase();
    return mode.includes('mc');
  });
}

function computeChapterStats(records) {
  const stats = {};
  (records || []).forEach(r => {
    const st = parseScoreTotal(r);
    if (!st) return;
    const { score, total } = st;

    const scope = String(r[8] || '');
    const chapters = parseScopeChapters(scope);
    if (chapters.length === 0) return;

    const perCorrect = score / chapters.length;
    const perTotal   = total / chapters.length;
    const confidenceWeight = 1 / chapters.length;

    chapters.forEach(ch => {
      if (!stats[ch]) {
        stats[ch] = { correct: 0, total: 0, sessions: 0, confidence: 0 };
      }
      stats[ch].correct    += perCorrect;
      stats[ch].total      += perTotal;
      stats[ch].sessions   += 1;
      stats[ch].confidence += confidenceWeight;
    });
  });

  return Object.entries(stats).map(([chapter, s]) => {
    let accuracy = 0;
    if (s.total > 0) {
      accuracy = Math.round((s.correct / s.total) * 100);
      accuracy = Math.max(0, Math.min(100, accuracy));
    }
    let reliability = 'low';
    if (s.confidence >= 3)      reliability = 'high';
    else if (s.confidence >= 1) reliability = 'medium';

    return {
      chapter,
      accuracy,
      total: Math.round(s.total),
      attempts: s.sessions,
      reliability,
      confidenceScore: Math.round(s.confidence * 10) / 10
    };
  }).sort((a, b) => {
    const aM = a.chapter.match(/Ch\.(\d+)/);
    const bM = b.chapter.match(/Ch\.(\d+)/);
    if (aM && bM) return parseInt(aM[1]) - parseInt(bM[1]);
    if (aM && !bM) return -1;
    if (!aM && bM) return 1;
    return a.chapter.localeCompare(b.chapter);
  });
}

/* 🆕 computeDailyBestBattle：每日取最高戰況分數（battlePoint）的一次練習來繪線圖 */
function computeDailyBestBattle(records, days) {
  const map = new Map();
  const now = new Date();

  (records || []).forEach(r => {
    let dateStr = String(r[7] || '').trim();
    if (!dateStr) {
      try {
        dateStr = getHKDateString(new Date(r[0]));
      } catch (e) {
        return;
      }
    }
    if (!dateStr) return;

    const st = parseScoreTotal(r);
    if (!st) return;

    const timeMs  = Number(r[4]) || 0;
    const scope   = String(r[8] || '');
    const bp      = calculateBattlePoint(st.score, st.total, timeMs, scope);
    const accuracy = st.total > 0 ? Math.max(0, Math.min(100, Math.round((st.score / st.total) * 100))) : 0;

    if (!map.has(dateStr)) {
      map.set(dateStr, { battlePoint: -1, accuracy: 0, correct: 0, total: 0, attempts: 0 });
    }
    const s = map.get(dateStr);
    s.attempts += 1;
    if (bp > s.battlePoint) {
      s.battlePoint = bp;
      s.accuracy    = accuracy;
      s.correct     = st.score;
      s.total       = st.total;
    }
  });

  const result = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const dStr = getHKDateString(d);
    const s = map.get(dStr);

    result.push({
      date:        dStr,
      label:       `${d.getMonth() + 1}/${d.getDate()}`,
      battlePoint: (s && s.battlePoint >= 0) ? s.battlePoint : null,
      accuracy:    (s && s.battlePoint >= 0) ? s.accuracy    : null,
      attempts:    s ? s.attempts : 0,
      correct:     s ? s.correct  : 0,
      total:       s ? s.total    : 0
    });
  }
  return result;
}

function collectImageUrls(question) {
  if (!question || typeof question !== 'object') return [];
  const urls = [];
  Object.entries(question).forEach(([key, val]) => {
    if (typeof key === 'string' && key.endsWith('_img') && typeof val === 'string' && val.trim()) {
      urls.push(val);
    }
  });
  return urls;
}

/* 🆕 真正的 LRU 圖片快取：存取時會重新插入，真正淘汰最久未用 */
const imageCache = new Map();
function preloadImage(url) {
  if (!url) return;
  if (imageCache.has(url)) {
    const existing = imageCache.get(url);
    imageCache.delete(url);
    imageCache.set(url, existing);
    return;
  }
  if (imageCache.size >= CONFIG.PRELOAD_CACHE_LIMIT) {
    imageCache.delete(imageCache.keys().next().value);
  }
  const img = new Image();
  img.src = url;
  imageCache.set(url, img);
}

const ToastContext = createContext(() => {});

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const idRef = useRef(0);

  const showToast = useCallback((message, type = 'info', duration = 3500) => {
    const id = ++idRef.current;
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => {
      setToasts(prev => prev.filter(t => t.id !== id));
    }, duration);
  }, []);

  const removeToast = useCallback((id) => {
    setToasts(prev => prev.filter(t => t.id !== id));
  }, []);

  const typeStyle = {
    info:    { bg: 'bg-indigo-500', border: 'border-indigo-600', icon: 'fa-circle-info' },
    success: { bg: 'bg-green-500',  border: 'border-green-600',  icon: 'fa-circle-check' },
    warning: { bg: 'bg-yellow-500', border: 'border-yellow-600', icon: 'fa-triangle-exclamation' },
    error:   { bg: 'bg-red-500',    border: 'border-red-600',    icon: 'fa-circle-xmark' }
  };

  return (
    <ToastContext.Provider value={showToast}>
      {children}
      <div className="fixed top-4 right-4 z-[1200] flex flex-col gap-2 items-end pointer-events-none max-w-[90vw]">
        <AnimatePresence>
          {toasts.map(t => {
            const style = typeStyle[t.type] || typeStyle.info;
            return (
              <motion.div
                key={t.id}
                initial={{ x: 400, opacity: 0 }}
                animate={{ x: 0, opacity: 1 }}
                exit={{ x: 400, opacity: 0 }}
                transition={{ type: 'spring', stiffness: 300, damping: 25 }}
                className={`${style.bg} ${style.border} text-white px-4 py-3 rounded-xl shadow-lg border flex items-start gap-3 pointer-events-auto min-w-[260px] max-w-sm`}
              >
                <i className={`fas ${style.icon} text-lg mt-0.5 flex-shrink-0`}></i>
                <div className="flex-1 text-sm leading-snug whitespace-pre-line">{t.message}</div>
                <button onClick={() => removeToast(t.id)} className="text-white/80 hover:text-white flex-shrink-0">
                  <i className="fas fa-times text-xs"></i>
                </button>
              </motion.div>
            );
          })}
        </AnimatePresence>
      </div>
    </ToastContext.Provider>
  );
}

function useWrongBook(userName, leaderboardData, isOnline, refetchLeaderboard) {
  const storageKey = useMemo(() => {
    if (!userName || userName === "訪客 (未登入)") return null;
    return CONFIG.STORAGE.wrongBookPrefix + userName;
  }, [userName]);

  const [wrongBook, setWrongBook] = useState({});
  const pendingOpsRef = useRef([]);
  const hasSyncedFromCloudRef = useRef(false);

  useEffect(() => {
    hasSyncedFromCloudRef.current = false;
    if (!storageKey) {
      setWrongBook({});
      return;
    }
    try {
      const raw = localStorage.getItem(storageKey);
      setWrongBook(raw ? JSON.parse(raw) : {});
    } catch (e) {
      setWrongBook({});
    }
  }, [storageKey]);

  useEffect(() => {
    if (!userName || userName === "訪客 (未登入)") return;
    if (leaderboardData && leaderboardData.wrongBook !== undefined) {
      setWrongBook(leaderboardData.wrongBook || {});
      hasSyncedFromCloudRef.current = true;
    }
  }, [leaderboardData, userName]);

  useEffect(() => {
    if (!storageKey) return;
    try { localStorage.setItem(storageKey, JSON.stringify(wrongBook)); }
    catch (e) {}
  }, [wrongBook, storageKey]);

  const sendOp = useCallback(async (action, extra) => {
    if (!userName || userName === "訪客 (未登入)") return;
    const body = { action, name: userName, ...extra };

    if (!isOnline) {
      pendingOpsRef.current.push(body);
      return;
    }
    try {
      await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      });
    } catch (e) {
      console.warn("錯題簿同步失敗，排進佇列:", e);
      pendingOpsRef.current.push(body);
    }
  }, [userName, isOnline]);

  useEffect(() => {
    if (!isOnline || !userName || userName === "訪客 (未登入)") return;
    if (pendingOpsRef.current.length === 0) return;

    const queue = [...pendingOpsRef.current];
    pendingOpsRef.current = [];

    Promise.all(queue.map(op =>
      fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(op)
      }).catch(() => { pendingOpsRef.current.push(op); })
    )).then(() => {
      if (refetchLeaderboard && pendingOpsRef.current.length === 0) {
        setTimeout(refetchLeaderboard, 1500);
      }
    });
  }, [isOnline, userName, refetchLeaderboard]);

  const addWrong = useCallback((question) => {
    const id = getQuestionId(question);
    if (!id || !userName || userName === "訪客 (未登入)") return;
    setWrongBook(prev => {
      const existing = prev[id];
      return {
        ...prev,
        [id]: {
          question,
          correctStreak: 0,
          wrongCount: existing ? (existing.wrongCount || 0) + 1 : 1,
          addedAt: existing ? existing.addedAt : Date.now(),
          lastWrongAt: Date.now()
        }
      };
    });
    sendOp('wrongbook_add', { questionId: id, questionData: question });
  }, [userName, sendOp]);

  const recordReviewAnswer = useCallback((question, isCorrect) => {
    const id = getQuestionId(question);
    if (!id) return { removed: false, newStreak: 0 };
    let info = { removed: false, newStreak: 0 };
    setWrongBook(prev => {
      const entry = prev[id];
      if (!entry) return prev;
      if (isCorrect) {
        const newStreak = (entry.correctStreak || 0) + 1;
        if (newStreak >= CONFIG.WRONG_BOOK_MASTERY_THRESHOLD) {
          const { [id]: _, ...rest } = prev;
          info = { removed: true, newStreak };
          return rest;
        }
        info = { removed: false, newStreak };
        return { ...prev, [id]: { ...entry, correctStreak: newStreak, lastReviewAt: Date.now() } };
      } else {
        info = { removed: false, newStreak: 0 };
        return { ...prev, [id]: { ...entry, correctStreak: 0, lastReviewAt: Date.now(), lastWrongAt: Date.now() } };
      }
    });
    sendOp('wrongbook_review', {
      questionId: id,
      isCorrect,
      threshold: CONFIG.WRONG_BOOK_MASTERY_THRESHOLD
    });
    return info;
  }, [sendOp]);

  const removeFromBook = useCallback((questionId) => {
    setWrongBook(prev => {
      const { [questionId]: _, ...rest } = prev;
      return rest;
    });
    sendOp('wrongbook_remove', { questionId });
  }, [sendOp]);

  const count = Object.keys(wrongBook).length;
  return { wrongBook, count, addWrong, recordReviewAnswer, removeFromBook };
}

function useGoogleSignIn(userName, onSignIn) {
  const toast = useToast();
  useEffect(() => {
    if (userName) return;
    let attempts = 0;
    let timer;
    const tryInit = () => {
      attempts++;
      if (attempts > CONFIG.GOOGLE_SIGNIN_MAX_ATTEMPTS) {
        clearInterval(timer);
        console.warn("Google Sign-In 載入失敗：超過最大嘗試次數");
        toast("Google 登入服務載入失敗，請檢查網路或廣告攔截器後重新整理頁面", "warning", 6000);
        return;
      }

      const btn = document.getElementById("googleSignInDiv");
      if (!window.google || !btn) return;

      window.google.accounts.id.initialize({
        client_id: CONFIG.GOOGLE_CLIENT_ID,
        hosted_domain: CONFIG.ALLOWED_EMAIL_DOMAIN.replace('@', ''),
        auto_select: true,
        callback: (response) => {
          const payload = decodeJwtResponse(response.credential);
          if (payload.email && payload.email.endsWith(CONFIG.ALLOWED_EMAIL_DOMAIN)) {
            onSignIn(payload.name);
            if (window.google) window.google.accounts.id.cancel();
          } else {
            toast(`登入失敗：請使用學校的 ${CONFIG.ALLOWED_EMAIL_DOMAIN} 帳號登入`, "error", 5000);
            window.google.accounts.id.revoke(payload.email, () => {});
          }
        }
      });
      window.google.accounts.id.renderButton(btn, { theme: "outline", size: "large", width: "100%", text: "continue_with" });
      window.google.accounts.id.prompt();
      clearInterval(timer);
    };
    timer = setInterval(tryInit, 100);
    return () => clearInterval(timer);
  }, [userName, onSignIn, toast]);
}

function useAntiCheat(gameState, currentIndex, isWrongBookMode) {
  const toast = useToast();
  const [tabSwitchCount, setTabSwitchCount] = useState(0);
  const questionStartTimeRef = useRef(Date.now());
  const perQuestionTimesRef  = useRef([]);
  const hasWarnedRef         = useRef(false);

  useEffect(() => {
    if (gameState !== 'playing' || isWrongBookMode) return;

    const handleVisibility = () => {
      if (document.hidden) {
        setTabSwitchCount(c => c + 1);
      } else if (CONFIG.ANTI_CHEAT.warnOnTabSwitch && !hasWarnedRef.current) {
        toast('⚠️ 偵測到離開頁面！請勿切換視窗或查閱外部資料，否則本次成績可能不被記錄。', 'warning', 5000);
        hasWarnedRef.current = true;
        setTimeout(() => { hasWarnedRef.current = false; }, 10000);
      }
    };

    const handleBlur = () => {
      if (!document.hidden) setTabSwitchCount(c => c + 1);
    };

    document.addEventListener('visibilitychange', handleVisibility);
    window.addEventListener('blur', handleBlur);
    return () => {
      document.removeEventListener('visibilitychange', handleVisibility);
      window.removeEventListener('blur', handleBlur);
    };
  }, [gameState, isWrongBookMode, toast]);

  useEffect(() => {
    if (gameState === 'playing') {
      questionStartTimeRef.current = Date.now();
    }
  }, [currentIndex, gameState]);

  const recordAnswerTime = useCallback(() => {
    const elapsed = Date.now() - questionStartTimeRef.current;
    perQuestionTimesRef.current.push(elapsed);
    questionStartTimeRef.current = Date.now();
  }, []);

  const resetAntiCheat = useCallback(() => {
    setTabSwitchCount(0);
    perQuestionTimesRef.current = [];
    questionStartTimeRef.current = Date.now();
    hasWarnedRef.current = false;
  }, []);

  const getCheatReport = useCallback((timeUsed, accuracy) => {
    const reasons = [];
    const AC = CONFIG.ANTI_CHEAT;

    if (timeUsed <= AC.minTimeMs && accuracy < AC.minAccuracy) {
      reasons.push(`整局時間過短（<${AC.minTimeMs/1000}秒）且正確率不足 ${AC.minAccuracy*100}%`);
    }

    const tooFast = perQuestionTimesRef.current.filter(t => t < AC.minTimePerQuestionMs).length;
    if (tooFast >= AC.maxTooFastQuestions) {
      reasons.push(`有 ${tooFast} 題在 ${AC.minTimePerQuestionMs}ms 內秒答`);
    }

    if (tabSwitchCount > AC.maxTabSwitches) {
      reasons.push(`遊戲期間切換頁面/視窗 ${tabSwitchCount} 次`);
    }

    return {
      isSuspicious: reasons.length > 0,
      reasons,
      stats: { tabSwitchCount, tooFastCount: tooFast, timeUsed, accuracy }
    };
  }, [tabSwitchCount]);

  return { tabSwitchCount, recordAnswerTime, resetAntiCheat, getCheatReport };
}

/* 🆕 React.memo 包裹避免不必要 re-render */
const LoadingImage = memo(function LoadingImage({
  src,
  alt = '',
  className = '',
  onClick,
  placeholderClassName = '',
  minHeight = 'min-h-[80px]',
  refreshKey = 0
}) {
  const MAX_RETRIES = 3;
  const [renderKey, setRenderKey] = useState(0);
  const [status, setStatus] = useState('loading');
  const retryCountRef = useRef(0);
  const prevSignalRef = useRef(`${src}::${refreshKey}`);
  const prevSrcRef    = useRef(src);

  useEffect(() => {
    const signal = `${src}::${refreshKey}`;
    if (signal === prevSignalRef.current) return;
    prevSignalRef.current = signal;

    if (!src) { setStatus('error'); return; }

    const srcChanged = src !== prevSrcRef.current;
    prevSrcRef.current = src;

    retryCountRef.current = srcChanged ? 0 : Math.min(retryCountRef.current + 1, MAX_RETRIES);

    setStatus('loading');
    setRenderKey(k => k + 1);
  }, [src, refreshKey]);

  if (!src) return null;

  const bust = retryCountRef.current > 0
    ? `${src.includes('?') ? '&' : '?'}_retry=${retryCountRef.current}`
    : '';
  const actualSrc = `${src}${bust}`;

  const handleRetry = (e) => {
    e.stopPropagation();
    if (retryCountRef.current >= MAX_RETRIES) return;
    retryCountRef.current += 1;
    setStatus('loading');
    setRenderKey(k => k + 1);
  };

  const retriesLeft = MAX_RETRIES - retryCountRef.current;

  return (
    <div className={`relative inline-flex items-center justify-center ${placeholderClassName}`}>
      {status === 'loading' && (
        <div className={`flex flex-col items-center justify-center ${minHeight} min-w-[120px] px-4 py-3 bg-gray-100 dark:bg-gray-700/60 rounded border border-dashed border-gray-200 dark:border-gray-600 text-gray-400 dark:text-gray-400 skeleton-pulse`}>
          <i className="fas fa-image text-2xl mb-1 opacity-30"></i>
          <span className="text-xs">圖片加載中...</span>
        </div>
      )}
      {status === 'error' && (
        <div className={`flex flex-col items-center justify-center ${minHeight} min-w-[140px] px-4 py-3 bg-red-50 dark:bg-red-900/20 rounded border border-dashed border-red-200 dark:border-red-800 text-red-500 dark:text-red-300`}>
          <i className="fas fa-image text-lg mb-1"></i>
          <span className="text-xs mb-2">圖片無法載入</span>
          {retriesLeft > 0 ? (
            <button
              type="button"
              onClick={handleRetry}
              className="text-xs bg-red-100 dark:bg-red-900/50 hover:bg-red-200 dark:hover:bg-red-800 text-red-700 dark:text-red-300 px-3 py-1 rounded-full font-medium transition-colors flex items-center gap-1 border border-red-200 dark:border-red-700"
              title="重新加載此圖片">
              <i className="fas fa-rotate-right"></i>
              重新加載（剩 {retriesLeft} 次）
            </button>
          ) : (
            <span className="text-[10px] text-red-400 dark:text-red-500">已達重試上限</span>
          )}
        </div>
      )}
      <img
        key={renderKey}
        src={actualSrc}
        alt={alt}
        className={className}
        onClick={onClick}
        onLoad={() => setStatus('loaded')}
        onError={() => setStatus('error')}
        style={{ display: status === 'loaded' ? '' : 'none' }}
      />
    </div>
  );
});

const DonutChart = memo(function DonutChart({ correct, total, size = 160 }) {
  if (total === 0) return <div className="text-center text-gray-400 dark:text-gray-500 py-8 text-sm">暫無數據</div>;
  const pct = correct / total;
  const r = size / 2 - 14;
  const cx = size / 2, cy = size / 2;
  const C = 2 * Math.PI * r;

  return (
    <div className="relative inline-block" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90" style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={cx} cy={cy} r={r} fill="none" strokeWidth="14"
                className="stroke-red-100 dark:stroke-red-900/40" />
        <circle cx={cx} cy={cy} r={r} fill="none" strokeWidth="14" strokeLinecap="round"
                strokeDasharray={`${pct * C} ${C}`}
                className={pct >= 0.8 ? "stroke-green-500" : pct >= 0.6 ? "stroke-yellow-500" : "stroke-red-500"} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="text-3xl font-bold text-gray-800 dark:text-gray-100">{Math.round(pct * 100)}%</div>
        <div className="text-xs text-gray-500 dark:text-gray-400">{correct}/{total}</div>
      </div>
    </div>
  );
});

const RadarChart = memo(function RadarChart({ data, size = 320 }) {
  if (!data || data.length < 3) {
    return <div className="text-center text-gray-400 dark:text-gray-500 py-8 text-sm">
      需要至少 3 個章節的練習紀錄才能繪製雷達圖
    </div>;
  }
  const maxPoints = 10;
  const points = data.slice(0, maxPoints);
  const n = points.length;
  const cx = size / 2, cy = size / 2;
  const R = size / 2 - 48;
  const rings = [20, 40, 60, 80, 100];

  const getPoint = (i, pct) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    return {
      x: cx + R * (pct / 100) * Math.cos(angle),
      y: cy + R * (pct / 100) * Math.sin(angle)
    };
  };

  const dataPoints = points.map((p, i) => getPoint(i, p.accuracy));
  const polygonPath = dataPoints.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="max-w-full">
      {rings.map(r => (
        <polygon key={r}
          points={points.map((_, i) => {
            const pt = getPoint(i, r);
            return `${pt.x.toFixed(1)},${pt.y.toFixed(1)}`;
          }).join(' ')}
          fill="none"
          className="stroke-gray-200 dark:stroke-gray-700"
          strokeWidth="1" />
      ))}
      {points.map((_, i) => {
        const pt = getPoint(i, 100);
        return <line key={i} x1={cx} y1={cy} x2={pt.x} y2={pt.y}
                     className="stroke-gray-200 dark:stroke-gray-700" strokeWidth="1" />;
      })}
      <polygon points={polygonPath} fill="rgba(99, 102, 241, 0.25)"
               className="stroke-indigo-500" strokeWidth="2" strokeLinejoin="round" />
      {dataPoints.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="4"
                className="fill-indigo-600 stroke-white dark:stroke-gray-800" strokeWidth="2" />
      ))}
      {points.map((p, i) => {
        const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
        const labelR = R + 22;
        const lx = cx + labelR * Math.cos(angle);
        const ly = cy + labelR * Math.sin(angle);
        return (
          <g key={i}>
            <text x={lx} y={ly - 4} textAnchor="middle" dominantBaseline="middle"
                  className="fill-gray-700 dark:fill-gray-300" fontSize="11" fontWeight="600">
              {p.chapter}
            </text>
            <text x={lx} y={ly + 8} textAnchor="middle" dominantBaseline="middle"
                  className="fill-indigo-500 dark:fill-indigo-400" fontSize="10" fontWeight="700">
              {p.accuracy}%
            </text>
          </g>
        );
      })}
    </svg>
  );
});

const LineChart = memo(function LineChart({ data, height = 240 }) {
  const [isDark, setIsDark] = useState(() =>
    typeof document !== 'undefined' &&
    document.documentElement.classList.contains('dark')
  );
  useEffect(() => {
    if (typeof document === 'undefined') return;
    const html = document.documentElement;
    const sync = () => setIsDark(html.classList.contains('dark'));
    sync();
    const mo = new MutationObserver(sync);
    mo.observe(html, { attributes: true, attributeFilter: ['class'] });
    return () => mo.disconnect();
  }, []);

  const C = isDark
    ? { grid: '#374151', text: '#9ca3af', line: '#818cf8',
        area: 'rgba(129,140,248,0.18)', dot: '#818cf8',
        dotStroke: '#1f2937', empty: '#4b5563',
        label: '#a5b4fc', muted: '#6b7280' }
    : { grid: '#e5e7eb', text: '#6b7280', line: '#6366f1',
        area: 'rgba(99,102,241,0.15)', dot: '#6366f1',
        dotStroke: '#ffffff', empty: '#d1d5db',
        label: '#4338ca', muted: '#9ca3af' };

  if (!data || data.length === 0) {
    return (
      <div className="text-center text-gray-400 dark:text-gray-500 py-8 text-sm">
        暫無數據
      </div>
    );
  }

  /* 動態 Y 軸上限：取最高 battlePoint，向上取整到美觀刻度 */
  const maxBP = Math.max(0, ...data.map(d => d.battlePoint ?? 0));
  const rawMax = maxBP <= 0 ? 200 : maxBP;
  const magnitude = Math.pow(10, Math.floor(Math.log10(rawMax)));
  const yMax = Math.ceil(rawMax / magnitude) * magnitude;
  const gridValues = [0, 0.25, 0.5, 0.75, 1.0].map(f => Math.round(f * yMax));

  const width  = Math.max(500, data.length * 44);
  const padding = { top: 32, right: 24, bottom: 40, left: 52 };
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;

  const multi = data.length > 1;
  const xStep = multi ? innerW / (data.length - 1) : 0;
  const getX  = (i) => multi ? padding.left + i * xStep : padding.left + innerW / 2;
  const getY  = (val) => padding.top + innerH * (1 - val / yMax);

  const indexed = data.map((d, i) => ({ ...d, __i: i }));
  const valid   = indexed.filter(
    d => typeof d.battlePoint === 'number' && d.battlePoint !== null && isFinite(d.battlePoint)
  );

  const pathD = valid.length > 0
    ? valid.map((d, idx) =>
        `${idx === 0 ? 'M' : 'L'} ${getX(d.__i).toFixed(2)} ${getY(d.battlePoint).toFixed(2)}`
      ).join(' ')
    : '';

  const areaD = valid.length >= 2
    ? `${pathD} L ${getX(valid[valid.length - 1].__i).toFixed(2)} ${getY(0).toFixed(2)} L ${getX(valid[0].__i).toFixed(2)} ${getY(0).toFixed(2)} Z`
    : '';

  const labelStep = Math.max(1, Math.ceil(data.length / 10));

  return (
    <div className="overflow-x-auto custom-scrollbar">
      <svg
        width={width}
        height={height}
        viewBox={`0 0 ${width} ${height}`}
        style={{ display: 'block', minWidth: '100%' }}
      >
        {gridValues.map(v => (
          <g key={`grid-${v}`}>
            <line
              x1={padding.left} y1={getY(v)}
              x2={width - padding.right} y2={getY(v)}
              stroke={C.grid} strokeWidth="1" strokeDasharray="2,3"
            />
            <text
              x={padding.left - 6} y={getY(v)}
              textAnchor="end" dominantBaseline="middle"
              fill={C.text} fontSize="10"
            >
              {v}
            </text>
          </g>
        ))}

        {data.map((d, i) => (i % labelStep === 0) && (
          <text
            key={`lbl-${i}`}
            x={getX(i)} y={height - padding.bottom + 18}
            textAnchor="middle"
            fill={C.text} fontSize="10"
          >
            {d.label}
          </text>
        ))}

        {indexed
          .filter(d => d.battlePoint === null || d.battlePoint === undefined)
          .map(d => (
            <circle
              key={`empty-${d.__i}`}
              cx={getX(d.__i)} cy={getY(0)} r="2.5"
              fill={C.empty} opacity="0.7"
            >
              <title>{d.date}：未練習</title>
            </circle>
          ))
        }

        {areaD && <path d={areaD} fill={C.area} stroke="none" />}

        {valid.length >= 2 && (
          <path
            d={pathD} fill="none"
            stroke={C.line} strokeWidth="2.5"
            strokeLinecap="round" strokeLinejoin="round"
          />
        )}

        {valid.map(d => {
          const x = getX(d.__i);
          const y = getY(d.battlePoint);
          const labelY = y - 14 < padding.top ? y + 18 : y - 14;
          return (
            <g key={`pt-${d.__i}`}>
              <circle
                cx={x} cy={y} r="5"
                fill={C.dot} stroke={C.dotStroke} strokeWidth="2"
              >
                <title>
                  {d.date}：戰況最高分 {d.battlePoint}（正確率 {d.accuracy}%，{d.attempts} 次練習，{Math.round(d.correct)}/{Math.round(d.total)} 題）
                </title>
              </circle>
              <text
                x={x} y={labelY} textAnchor="middle"
                fill={C.label} fontSize="11" fontWeight="700"
              >
                {d.battlePoint}
              </text>
            </g>
          );
        })}

        {valid.length === 0 && (
          <g>
            <text
              x={width / 2} y={height / 2 - 8}
              textAnchor="middle" dominantBaseline="middle"
              fill={C.muted} fontSize="14" fontWeight="600"
            >
              📭 所選時間範圍內沒有練習紀錄
            </text>
            <text
              x={width / 2} y={height / 2 + 14}
              textAnchor="middle" dominantBaseline="middle"
              fill={C.empty} fontSize="11"
            >
              完成一局練習後，這裡就會出現你的曲線！
            </text>
          </g>
        )}
      </svg>
    </div>
  );
});

const ChapterMasteryGrid = memo(function ChapterMasteryGrid({ data }) {

      return 'bg-red-200 text-red-900 border-red-300 dark:bg-red-900/40 dark:text-red-100 dark:border-red-700';
    }
    if (d.accuracy >= 80) return 'bg-green-500 text-white border-green-600 dark:bg-green-600 dark:border-green-500 shadow-sm';
    if (d.accuracy >= 60) return 'bg-yellow-500 text-white border-yellow-600 dark:bg-yellow-600 dark:border-yellow-500 shadow-sm';
    return 'bg-red-500 text-white border-red-600 dark:bg-red-600 dark:border-red-500 shadow-sm';
  };

  const relLabel = (r) => r === 'high' ? '高' : r === 'medium' ? '中' : '低';

  return (
    <div>
      <div className="grid grid-cols-5 sm:grid-cols-7 md:grid-cols-9 lg:grid-cols-10 gap-1.5">
        {data.map((d, i) => (
          <div
            key={i}
            title={`${d.chapter}\n正確率：${d.accuracy}%\n≈${d.total} 題 / ${d.attempts} 次練習\n可信度：${relLabel(d.reliability)}（${d.confidenceScore}）`}
            className={`aspect-square rounded-md border flex flex-col items-center justify-center transition-transform hover:scale-110 hover:z-10 cursor-help relative ${getCellClass(d)}`}
          >

function MasteryMatrix({
  students,
  chapters,
  selectedStudent,
  setSelectedStudent
}) {
  if (students.length === 0 || chapters.length === 0) {
    return <div className="text-center text-gray-400 dark:text-gray-500 py-6 text-sm">暫無數據</div>;
  }
  const getCellClass = (acc) => {
    if (acc === undefined || acc === null) return 'bg-gray-200 dark:bg-gray-600 text-gray-400';
    if (acc >= 80) return 'bg-green-500 text-white';
    if (acc >= 60) return 'bg-yellow-400 text-white';
    return 'bg-red-400 text-white';
  };
  return (
    <div className="overflow-x-auto custom-scrollbar">
      {selectedStudent && (
        <button
          onClick={() => setSelectedStudent('')}
          className="text-xs px-3 py-1 rounded-lg bg-gray-100 dark:bg-gray-700"
        >
          ← 返回我的統計
        </button>
      )}
      <table className="min-w-full text-xs border-separate" style={{borderSpacing: '2px'}}>
        <thead>
          <tr>
            <th className="sticky left-0 bg-white dark:bg-gray-800 py-2 px-2 text-left text-gray-500 dark:text-gray-400 font-semibold z-10 whitespace-nowrap">
              學生
            </th>
            {chapters.map(ch => (
              <th key={ch} className="py-2 px-1 text-gray-500 dark:text-gray-400 font-semibold whitespace-nowrap">
                {ch}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {students.map((s, i) => {
            const chMap = {};
            (s.chapterStats || []).forEach(c => { chMap[c.chapter] = c.accuracy; });
            return (
              <tr key={i}>
                <td className="sticky left-0 bg-white dark:bg-gray-800 py-1 px-2 font-medium text-gray-700 dark:text-gray-200 whitespace-nowrap z-10 border-r border-gray-100 dark:border-gray-700">
                  <div className="flex items-center gap-2">
                    <span>{s.name}</span>
                    <button
                      onClick={() => setSelectedStudent(s.rawName || s.name)}
                      className="text-[10px] px-2 py-1 rounded bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 hover:bg-indigo-200 dark:hover:bg-indigo-800 transition"
                    >
                      查看
                    </button>
                  </div>
                </td>
                {chapters.map(ch => {
                  const acc = chMap[ch];
                  return (
                    <td key={ch} className="p-0">
                      <div className={`w-10 h-8 rounded flex items-center justify-center text-[10px] font-bold ${getCellClass(acc)}`}
                           title={`${s.name} - ${ch}: ${acc !== undefined ? acc + '%' : '無數據'}`}>
                        {acc !== undefined ? acc : '–'}
                      </div>
                    </td>
                  );
                })}
              </tr>
            );
          })}

      </table>
    </div>
  );
}

function FlashCard({ data, onSubmit, currentIndex, totalCount, startTime, mySkipCards = 0, onUseSkipCard, isWrongBookMode = false, wrongBookStreak = 0, onExitWrongBook }) {
  const toast = useToast();
  const [showAnswer, setShowAnswer] = useState(false);
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [isAnswerCorrect, setIsAnswerCorrect] = useState(null);
  const [isLightboxOpen, setIsLightboxOpen] = useState(false);

  const [imgRefreshKey, setImgRefreshKey] = useState(0);
  const [isRefreshSpinning, setIsRefreshSpinning] = useState(false);

  /* 🆕 直接用 useMemo 產生洗牌選項，移除原本的 useState+useEffect 額外渲染 */
  const shuffledData = useMemo(() => {
    if (!data) return [];
    const opts = resolveOptions(data);
    if (opts.length === 0) return [];
    return shuffleArray(opts.map((opt, i) => ({ text: opt, origIdx: i, img: data[`opt_${i}_img`] })));
  }, [data, currentIndex]);

  useEffect(() => {
    setShowAnswer(false);
    setSelectedIdx(null);
    setIsAnswerCorrect(null);
    setImgRefreshKey(0);
  }, [currentIndex, data]);

  const handleOptionClick = useCallback((idx, item) => {
    if (showAnswer) return;
    setSelectedIdx(idx);
    setShowAnswer(true);
    const isCorrect = item.origIdx === resolveCorrectIndex(data.correctIndex);
    setIsAnswerCorrect(isCorrect);
    onSubmit(isCorrect, item.text, item.origIdx);
  }, [showAnswer, data, onSubmit]);

  useEffect(() => {
    const onKey = (e) => {
      if (showAnswer || !shuffledData.length) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      const letterIdx = ['a','b','c','d','e','f'].indexOf(e.key.toLowerCase());
      const numIdx = ['1','2','3','4','5','6'].indexOf(e.key);
      const idx = letterIdx >= 0 ? letterIdx : numIdx;
      if (idx >= 0 && idx < shuffledData.length) {
        e.preventDefault();
        handleOptionClick(idx, shuffledData[idx]);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showAnswer, shuffledData, handleOptionClick]);

  const handleRefreshImages = useCallback(() => {
    const urls = collectImageUrls(data);
    if (urls.length === 0) {
      toast("本題沒有圖片可以刷新", "info", 2000);
      return;
    }
    urls.forEach(u => evictImageCache(u));
    setImgRefreshKey(k => k + 1);
    setIsRefreshSpinning(true);
    setTimeout(() => setIsRefreshSpinning(false), 600);
    toast(`已重新載入 ${urls.length} 張圖片`, "success", 2000);
  }, [data, toast]);

  if (!data) return <div className="text-center p-10 text-gray-700 dark:text-gray-200">載入題目中...</div>;
  if (shuffledData.length === 0) return (
    <div className="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl w-full text-center">
      <i className="fas fa-exclamation-triangle text-yellow-500 text-3xl mb-3"></i>
      <p className="text-gray-700 dark:text-gray-200 font-bold">此題資料異常，無法載入選項</p>
      <p className="text-gray-400 dark:text-gray-500 text-sm mt-1">請點擊「再來一局」重新開始，或從錯題簿中移除此題。</p>
    </div>
  );

  const hasOptionImages = shuffledData.some(item => item.img);
  const questionText    = data.title || data.question || "";
  const categoryText    = data.category || "生物練習";
  const hasAnyImage     = collectImageUrls(data).length > 0;

  return (
    <div className="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-xl w-full relative overflow-hidden transition-colors">
      <QuestionProgressBar current={currentIndex + 1} total={totalCount} />

      {isWrongBookMode && (
        <div className="mb-3 p-2 bg-gradient-to-r from-red-50 to-pink-50 dark:from-red-900/30 dark:to-pink-900/30 border border-red-200 dark:border-red-800 rounded-lg flex items-center justify-between text-xs">
          <span className="text-red-700 dark:text-red-300 font-bold flex items-center gap-1">
            <i className="fas fa-book-bookmark"></i> 錯題簿複習模式
          </span>
          <div className="flex items-center gap-2">
            <span className="text-red-600 dark:text-red-400">
              本題進度: {wrongBookStreak}/{CONFIG.WRONG_BOOK_MASTERY_THRESHOLD}

          使用跳題卡 (剩餘 {mySkipCards})

      )}

      <ImageLightbox src={data.question_img} isOpen={isLightboxOpen} onClose={() => setIsLightboxOpen(false)} />
    </div>
  );
}

function StatsScreen({ onBack, userName, leaderboardData, wrongBookCount }) {
  const [timeRange, setTimeRange] = useState(7);
  const isTeacherUser = isTeacher(userName);
  const [selectedStudent, setSelectedStudent] = useState('');

  const allStudents = useMemo(() => {
    if (!isTeacherUser) return [];
    const users = leaderboardData?.users || [];
    return users
      .map(u => String(u[0] || '').trim())
      .filter(name => name && name !== '訪客 (未登入)' && !isTeacher(name))
      .sort((a, b) => (String(shortenName(a) || '')).localeCompare(String(shortenName(b) || '')));
  }, [leaderboardData, isTeacherUser]);

  const viewingUser = isTeacherUser && selectedStudent ? selectedStudent : userName;

  const records = useMemo(
    () => getStudentRecords(leaderboardData?.records, viewingUser),
    [leaderboardData, viewingUser]
  );
  const user = findUser(leaderboardData, viewingUser);

  /* 🆕 合併使用 parseScoreTotal，單次遍歷完成三個加總 */
  const { totalAttempts, totalCorrect, totalQuestions, avgAccuracy } = useMemo(() => {
    let totalCorrect = 0, totalQuestions = 0;
    records.forEach(r => {
      const st = parseScoreTotal(r);
      if (!st) return;
      totalCorrect += st.score;
      totalQuestions += st.total;
    });
    let avg = totalQuestions > 0 ? (totalCorrect / totalQuestions * 100) : 0;
    avg = Math.max(0, Math.min(100, avg));
    return {
      totalAttempts: records.length,
      totalCorrect,
      totalQuestions,
      avgAccuracy: avg
    };
  }, [records]);

  const chapterStats = useMemo(() => computeChapterStats(records), [records]);
  const weakSpots = useMemo(
    () => [...chapterStats]
      .filter(c => c.reliability !== 'low')
      .sort((a, b) => a.accuracy - b.accuracy)
      .slice(0, 3),
    [chapterStats]
  );
  const growthData = useMemo(() => computeDailyBestBattle(records, timeRange), [records, timeRange]);

  const levelInfo = getLevelInfo(user?.totalQuestions || 0);

  const achievementTiers = [
    { id: 'first_100',  label: '初心者',   desc: '累計完成 100 題',  target: 100,  icon: '🌱', color: 'green' },
    { id: 'first_500',  label: '勤奮學徒', desc: '累計完成 500 題',  target: 500,  icon: '🌿', color: 'blue' },
    { id: 'first_1000', label: '熟練生物人', desc: '累計完成 1000 題', target: 1000, icon: '🌳', color: 'purple' },
    { id: 'first_2000', label: '生物大師', desc: '累計完成 2000 題', target: 2000, icon: '🏆', color: 'orange' }
  ];
  const totalQ = user?.totalQuestions || 0;

  return (
    <div className="w-full max-w-5xl px-4 pb-10">
      <div className="glass-panel p-4 md:p-6 rounded-2xl shadow-xl">
        <div className="flex items-center justify-between mb-6 border-b border-gray-200 dark:border-gray-700 pb-4">
          <h2 className="text-xl md:text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <i className="fas fa-chart-line text-indigo-600 dark:text-indigo-400"></i>
            {selectedStudent ? `${shortenName(selectedStudent)} 的學習統計` : '我的學習統計'}
          </h2>
          <div className="flex flex-col items-end gap-2">
            <span className="text-xs md:text-sm text-gray-500 dark:text-gray-400">
              {shortenName(viewingUser)}
            </span>
            {isTeacherUser && (
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-500 dark:text-gray-400">查看學生：</span>
                <select
                  value={selectedStudent}
                  onChange={(e) => setSelectedStudent(e.target.value)}
                  className="text-xs px-3 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200"
                >
                  <option value="">我自己的統計</option>
                  {allStudents.map((student, i) => (
                    <option key={i} value={student}>{shortenName(student)}</option>

          </div>

        {totalAttempts === 0 && (
          <div className="mb-6 p-6 bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-200 dark:border-indigo-800 rounded-xl text-center">
            <i className="fas fa-rocket text-4xl text-indigo-400 dark:text-indigo-300 mb-3"></i>
            <p className="text-indigo-700 dark:text-indigo-300 font-bold">你還沒有練習記錄！</p>
            <p className="text-indigo-500 dark:text-indigo-400 text-sm mt-1">完成第一局練習後，這裡就會顯示詳細統計。</p>
          </div>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">

            <h3 className="font-bold text-gray-800 dark:text-gray-100 mb-3 flex items-center gap-2">

            <div className="space-y-3">

              {[7, 30].map(d => (
                <button key={d} onClick={() => setTimeRange(d)}
                  className={`px-3 py-1 text-xs rounded-lg font-medium transition ${
                    timeRange === d 
                      ? 'bg-indigo-600 text-white' 
                      : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'
                  }`}>
                  過去 {d} 天
                </button>
              ))}
            </div>
          </div>
          <LineChart data={growthData} />
          <p className="text-[11px] text-gray-400 dark:text-gray-500 mt-2 text-center">
            💡 每個資料點顯示當日所有練習中<b>最高戰況分數</b>，懸停可查看正確率與練習次數
          </p>
        </div>

        <button onClick={onBack} className="w-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-bold py-3 rounded-xl transition-colors">
          <i className="fas fa-arrow-left mr-2"></i>返回主頁
        </button>
      </div>
    </div>
  );
}

function TeacherStatsScreen({ onBack, leaderboardData, currentUserName }) {
  const [sortBy, setSortBy] = useState('accuracy');
  const [sortDir, setSortDir] = useState('desc');
  const [selectedForm, setSelectedForm] = useState('All');
  const [selectedStudent, setSelectedStudent] = useState(null);

  const studentsData = useMemo(() => {
    const records = leaderboardData?.records || [];
    const users   = leaderboardData?.users   || [];
    const map = new Map();

    users.forEach(u => {
      const rawName = String(u[0] || '').trim();
      if (!rawName || isTeacher(rawName)) return;
      const key = shortenName(rawName).toLowerCase().trim();
      map.set(key, {
        name: shortenName(rawName),
        rawName: rawName,
        form: getStudentForm(rawName),
        totalQuestions: parseInt(u[1]) || 0,
        lastLogin: u[2] || null,
        records: [],
        totalCorrect: 0,
        totalAttempted: 0,
        attempts: 0
      });
    });

    records.forEach(r => {
      const rawName = String(r[1] || '').trim();
      if (!rawName || rawName === '訪客 (未登入)' || rawName === 'Guest') return;
      if (isTeacher(rawName)) return;
      const mode = String(r[6] || '').toLowerCase();
      if (!mode.includes('mc')) return;

      const key = shortenName(rawName).toLowerCase().trim();
      if (!map.has(key)) {
        map.set(key, {
          name: shortenName(rawName),
          rawName: rawName,
          form: getStudentForm(rawName),
          totalQuestions: 0,
          lastLogin: null,
          records: [],
          totalCorrect: 0,
          totalAttempted: 0,
          attempts: 0
        });
      }
      const s = map.get(key);
      const st = parseScoreTotal(r);
      if (!st) return;

      s.records.push(r);
      s.totalCorrect += st.score;
      s.totalAttempted += st.total;
      s.attempts += 1;
    });

    return Array.from(map.values()).map(s => {
      let acc = s.totalAttempted > 0 ? (s.totalCorrect / s.totalAttempted * 100) : 0;
      acc = Math.max(0, Math.min(100, acc));
      return {
        ...s,
        accuracy: acc,
        chapterStats: computeChapterStats(s.records)
      };
    });
  }, [leaderboardData]);

  const filteredStudentsData = useMemo(() => {
    if (selectedForm === 'All') return studentsData;
    return studentsData.filter(s => s.form === selectedForm);
  }, [studentsData, selectedForm]);

  const totalStudents = filteredStudentsData.length;
  const activeStudents = filteredStudentsData.filter(s => s.attempts > 0).length;
  const inactiveStudents = useMemo(
    () => filteredStudentsData.filter(s => s.attempts === 0),
    [filteredStudentsData]
  );
  
  const laggingStudents = useMemo(() => {
    const todayStr = getHKDateString();
    return filteredStudentsData.filter(s => {
      if (!s.lastLogin || s.attempts === 0) return false;
      const lastStr = safeDateStr(s.lastLogin);
      if (!lastStr) return false;
      const [ty, tm, td] = todayStr.split('-').map(Number);
      const [ly, lm, ld] = lastStr.split('-').map(Number);
      if (!ly) return false;
      const diffMs = new Date(ty, tm - 1, td) - new Date(ly, lm - 1, ld);
      return Math.floor(diffMs / 86400000) >= 3;
    });
  }, [filteredStudentsData]);

  const activeStudentsWithData = useMemo(
    () => filteredStudentsData.filter(s => s.totalAttempted > 0),
    [filteredStudentsData]
  );
  const classAvgAcc = activeStudentsWithData.length > 0
    ? activeStudentsWithData.reduce((sum, s) => sum + s.accuracy, 0) / activeStudentsWithData.length
    : 0;
  const totalAttemptsClass = filteredStudentsData.reduce((sum, s) => sum + s.attempts, 0);

  const distData = useMemo(() => {
    const bins = [
      { label: '0-40%',   min: 0,  max: 40,      count: 0, color: 'bg-red-500' },
      { label: '40-60%',  min: 40, max: 60,       count: 0, color: 'bg-orange-400' },
      { label: '60-75%',  min: 60, max: 75,       count: 0, color: 'bg-yellow-400' },
      { label: '75-90%',  min: 75, max: 90,       count: 0, color: 'bg-green-400' },
      { label: '90-100%', min: 90, max: 100.01,   count: 0, color: 'bg-emerald-500' }
    ];
    activeStudentsWithData.forEach(s => {
      bins.forEach(b => {
        if (s.accuracy >= b.min && s.accuracy < b.max) b.count++;
      });
    });
    const maxBinCount = Math.max(1, ...bins.map(b => b.count));
    return bins.map(b => ({
      label: b.label,
      value: Math.round(b.count / maxBinCount * 100),
      valueLabel: `${b.count} 人`,
      color: b.color
    }));
  }, [activeStudentsWithData]);

  const classChapterStats = useMemo(() => {
    const allRecords = filteredStudentsData.flatMap(s => s.records);
    return computeChapterStats(allRecords);
  }, [filteredStudentsData]);

  const weakestChapters = useMemo(() =>
    [...classChapterStats]
      .filter(c => c.reliability !== 'low')
      .sort((a, b) => a.accuracy - b.accuracy)
      .slice(0, 5),
    [classChapterStats]
  );

  const allChapters = useMemo(() => classChapterStats.map(c => c.chapter), [classChapterStats]);

  const sortedStudents = useMemo(() => {
    const arr = [...filteredStudentsData];
    arr.sort((a, b) => {
      let av, bv;
      if (sortBy === 'name') { av = a.name; bv = b.name; }
      else if (sortBy === 'totalQ') { av = a.totalQuestions; bv = b.totalQuestions; }
      else if (sortBy === 'attempts') { av = a.attempts; bv = b.attempts; }
      else { av = a.accuracy; bv = b.accuracy; }
      if (typeof av === 'string') {
        return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      }
      return sortDir === 'asc' ? av - bv : bv - av;
    });
    return arr;
  }, [filteredStudentsData, sortBy, sortDir]);

  const handleSort = useCallback((col) => {
    if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir(col === 'name' ? 'asc' : 'desc'); }
  }, [sortBy]);

  const SortIcon = ({ col }) => sortBy !== col
    ? <i className="fas fa-sort text-gray-300 dark:text-gray-600 ml-1"></i>
    : <i className={`fas fa-sort-${sortDir === 'asc' ? 'up' : 'down'} text-indigo-500 ml-1`}></i>;

  if (selectedStudent) {
    return (
      <StatsScreen
        onBack={() => setSelectedStudent(null)}
        userName={selectedStudent}
        leaderboardData={leaderboardData}
        wrongBookCount={0}
      />
    );
  }

  return (
    <div className="w-full max-w-6xl px-4 pb-10">
      <div className="glass-panel p-4 md:p-6 rounded-2xl shadow-xl">
        <div className="flex items-center justify-between mb-6 border-b border-gray-200 dark:border-gray-700 pb-4 flex-wrap gap-2">
          <h2 className="text-xl md:text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
            <i className="fas fa-chalkboard-teacher text-amber-600 dark:text-amber-400"></i>
            教師儀表板
          </h2>
          <span className="text-xs md:text-sm bg-gradient-to-r from-amber-100 to-orange-100 dark:from-amber-900/50 dark:to-orange-900/50 text-amber-800 dark:text-amber-300 px-3 py-1 rounded-full font-bold">
            <i className="fas fa-user-tie mr-1"></i>{shortenName(currentUserName)}
          </span>
        </div>

        <div className="flex gap-2 mb-6 overflow-x-auto custom-scrollbar pb-2">
          {[
            { id: 'All', label: '全校總覽' },
            { id: '4', label: '中四 (F.4)' },
            { id: '5', label: '中五 (F.5)' },
            { id: '6', label: '中六 (F.6)' }
          ].map(form => (
            <button
              key={form.id}
              onClick={() => setSelectedForm(form.id)}
              className={`px-4 py-1.5 rounded-full text-sm font-bold transition-all whitespace-nowrap flex items-center gap-2 ${
                selectedForm === form.id
                  ? 'bg-indigo-600 text-white shadow-md'
                  : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700 hover:bg-indigo-50 dark:hover:bg-gray-700'
              }`}
            >
              {selectedForm === form.id && <i className="fas fa-check-circle"></i>}
              {form.label}
            </button>
          ))}
        </div>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
          <KPICard icon="👥" label="學生總數" value={totalStudents} color="blue" />
          <KPICard icon="✅" label="活躍學生"
            value={`${activeStudents}/${totalStudents}`} color="green"
            sub={`參與率 ${totalStudents > 0 ? Math.round(activeStudents / totalStudents * 100) : 0}%`} />
          <KPICard icon="🎯" label="班級平均正確率"
            value={activeStudentsWithData.length > 0 ? `${classAvgAcc.toFixed(1)}%` : '—'}
            color={classAvgAcc >= 75 ? 'green' : classAvgAcc >= 60 ? 'orange' : 'red'} />
          <KPICard icon="📚" label="班級累計作答" value={totalAttemptsClass} color="purple" />
        </div>

        {(inactiveStudents.length > 0 || laggingStudents.length > 0) && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
            {inactiveStudents.length > 0 && (
              <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-3">
                <div className="flex items-center gap-2 mb-2">
                  <i className="fas fa-user-xmark text-red-500"></i>
                  <span className="font-bold text-red-700 dark:text-red-300 text-sm">尚未開始的學生（{inactiveStudents.length} 人）</span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {inactiveStudents.slice(0, 20).map((s, i) => (
                    <span key={i} className="text-xs bg-white dark:bg-red-900/40 text-red-700 dark:text-red-300 px-2 py-0.5 rounded border border-red-200 dark:border-red-800">
                      {s.name}
                    </span>
                  ))}
                  {inactiveStudents.length > 20 && <span className="text-xs text-red-600 dark:text-red-400">...等 {inactiveStudents.length} 人</span>}
                </div>
              </div>
            )}
            {laggingStudents.length > 0 && (
              <div className="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-xl p-3">
                <div className="flex items-center gap-2 mb-2">
                  <i className="fas fa-exclamation-circle text-yellow-500"></i>
                  <span className="font-bold text-yellow-700 dark:text-yellow-300 text-sm">
                    進度落後學生（{laggingStudents.length} 人，連續 3 天或以上未練習）
                  </span>
                </div>
                <div className="flex flex-wrap gap-1">
                  {laggingStudents.map((s, i) => (
                    <span key={i} className="text-xs bg-white dark:bg-yellow-900/40 text-yellow-700 dark:text-yellow-300 px-2 py-0.5 rounded border border-yellow-200 dark:border-yellow-800">
                      {s.name} ({s.lastLogin ? safeDateStr(s.lastLogin) : '無紀錄'})
                    </span>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-6">
          <h3 className="font-bold text-gray-800 dark:text-gray-100 mb-3 flex items-center gap-2">
            <i className="fas fa-chart-column text-purple-500"></i>班級正確率分布
          </h3>
          {activeStudentsWithData.length === 0 ? (
            <div className="text-center text-gray-400 dark:text-gray-500 py-6 text-sm">暫無足夠數據</div>
          ) : (
            <BarChart data={distData} />
          )}
          <p className="text-[11px] text-gray-500 dark:text-gray-400 mt-3 text-center">
            💡 若分布集中在低分區 → 全班普遍偏低；若兩端都有 → 分化嚴重，建議分層教學
          </p>
        </div>

        <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-6">
          <h3 className="font-bold text-gray-800 dark:text-gray-100 mb-3 flex items-center gap-2">
            <i className="fas fa-fire text-red-500"></i>教學熱點：全班最弱的 5 個章節
          </h3>
          <p className="text-xs text-gray-500 dark:text-gray-400 mb-3">
            <i className="fas fa-lightbulb text-yellow-500 mr-1"></i>
            建議在課堂上優先重點講解以下章節（僅列出可信度「中」或「高」的章節，避免被低可信度資料誤導）
          </p>
          {weakestChapters.length === 0 ? (
            <div className="text-center text-gray-400 dark:text-gray-500 py-6 text-sm">暫無足夠可信的章節資料</div>
          ) : (
            <div className="space-y-2">
              {weakestChapters.map((c, i) => (
                <div key={i} className="flex items-center gap-3 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-900/50">
                  <span className="text-2xl flex-shrink-0">{['🔥','⚠️','💡','📌','🎯'][i]}</span>
                  <div className="flex-1">
                    <div className="font-bold text-gray-700 dark:text-gray-200">{c.chapter}</div>
                    <div className="text-[11px] text-gray-500 dark:text-gray-400">
                      全班累計作答 ≈{c.total} 題 · 可信度 {c.reliability === 'high' ? '高' : '中'}
                    </div>
                  </div>
                  <div className="text-right">
                    <div className="text-xl font-bold text-red-600 dark:text-red-400">{c.accuracy}%</div>
                    <div className="text-[10px] text-red-500 dark:text-red-300">平均正確率</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-6">
          <h3 className="font-bold text-gray-800 dark:text-gray-100 mb-3 flex items-center gap-2">
            <i className="fas fa-th text-indigo-500"></i>章節掌握矩陣
          </h3>
          <div className="flex gap-3 mb-3 text-xs flex-wrap">
            <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded bg-green-500"></span>≥80%</span>
            <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded bg-yellow-400"></span>60-80%</span>
            <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded bg-red-400"></span>&lt;60%</span>
            <span className="flex items-center gap-1"><span className="inline-block w-3 h-3 rounded bg-gray-200 dark:bg-gray-600"></span>無數據</span>
            <span className="text-gray-400 ml-auto hidden md:inline">（可左右滑動查看）</span>
          </div>
          <MasteryMatrix
            students={sortedStudents}
            chapters={allChapters}
            selectedStudent={selectedStudent}
            setSelectedStudent={setSelectedStudent}
          />
        </div>

        <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-6">
          <h3 className="font-bold text-gray-800 dark:text-gray-100 mb-3 flex items-center gap-2">
            <i className="fas fa-users text-green-500"></i>學生名單與表現（共 {totalStudents} 位）
          </h3>
          <div className="overflow-x-auto custom-scrollbar">
            <table className="w-full text-sm min-w-[600px]">
              <thead>
                <tr className="text-gray-500 dark:text-gray-400 border-b-2 border-gray-200 dark:border-gray-700">
                  <th className="text-left py-2 px-2 cursor-pointer hover:text-indigo-500" onClick={() => handleSort('name')}>
                    學生<SortIcon col="name" />
                  </th>
                  <th className="text-right py-2 px-2 cursor-pointer hover:text-indigo-500" onClick={() => handleSort('totalQ')}>
                    累計題數<SortIcon col="totalQ" />
                  </th>
                  <th className="text-right py-2 px-2 cursor-pointer hover:text-indigo-500" onClick={() => handleSort('attempts')}>
                    練習次數<SortIcon col="attempts" />
                  </th>
                  <th className="text-right py-2 px-2 cursor-pointer hover:text-indigo-500" onClick={() => handleSort('accuracy')}>
                    正確率<SortIcon col="accuracy" />
                  </th>
                  <th className="text-right py-2 px-2">狀態</th>
                </tr>
              </thead>
              <tbody>
                {sortedStudents.length === 0 ? (
                  <tr><td colSpan="5" className="text-center text-gray-400 dark:text-gray-500 py-6">暫無學生數據</td></tr>
                ) : sortedStudents.map((s, i) => (
                  <tr key={i} className="border-b border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50">
                    <td className="py-2 px-2 font-medium text-gray-800 dark:text-gray-100">{s.name}</td>
                    <td className="py-2 px-2 text-right text-gray-600 dark:text-gray-300 font-mono">{s.totalQuestions}</td>
                    <td className="py-2 px-2 text-right text-gray-600 dark:text-gray-300 font-mono">{s.attempts}</td>
                    <td className="py-2 px-2 text-right">
                      {s.attempts > 0 ? (
                        <span className={`font-bold ${s.accuracy >= 80 ? 'text-green-600 dark:text-green-400' : s.accuracy >= 60 ? 'text-yellow-600 dark:text-yellow-400' : 'text-red-600 dark:text-red-400'}`}>
                          {s.accuracy.toFixed(1)}%
                        </span>
                      ) : <span className="text-gray-400">—</span>}
                    </td>
                    <td className="py-2 px-2 text-right">
                      {s.attempts === 0 ? (
                        <span className="text-xs bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300 px-2 py-0.5 rounded">未開始</span>
                      ) : s.attempts < 3 ? (
                        <span className="text-xs bg-yellow-100 dark:bg-yellow-900/50 text-yellow-700 dark:text-yellow-300 px-2 py-0.5 rounded">進度落後</span>
                      ) : (
                        <span className="text-xs bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300 px-2 py-0.5 rounded">活躍</span>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <button onClick={onBack} className="w-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-bold py-3 rounded-xl transition-colors">
          <i className="fas fa-arrow-left mr-2"></i>返回主頁
        </button>
      </div>
    </div>
  );
}

function resolveOptions(q) {
  if (!q) return [];
  if (Array.isArray(q.options) && q.options.length > 0) return q.options;
  const opts = [];
  for (let i = 0; i < 8; i++) {
    if (q[`opt_${i}`] !== undefined && q[`opt_${i}`] !== null) {
      opts.push(q[`opt_${i}`]);
    } else break;
  }
  return opts;
}

function resolveCorrectIndex(raw) {
  if (raw === undefined || raw === null || raw === '') return null;
  const n = Number(raw);
  if (!isNaN(n)) return n;
  const letter = String(raw).trim().toUpperCase();
  const idx = ['A','B','C','D','E','F'].indexOf(letter);
  return idx >= 0 ? idx : null;
}

function ResultScreen({ results, onRestart, totalTime, leaderboardData, userName, loadingRank, debugInfo, isGuest, pendingSubmitCount, scope, isWrongBookMode, wrongBookRemovedCount }) {
  const [showDebug, setShowDebug] = useState(false);
  const [expanded, setExpanded] = useState(new Set());

  const toggleItem = useCallback((idx) => {
    setExpanded(prev => {
      const s = new Set(prev);
      s.has(idx) ? s.delete(idx) : s.add(idx);
      return s;
    });
  }, []);

  const correctCount = results.filter(r => r.isCorrect).length;
  const percentage   = Math.round((correctCount / results.length) * 100);
  const isRecorded   = userName && !isGuest && userName !== "訪客 (未登入)" && !isWrongBookMode;

  const { daily, weeklyRank, currentStreak } = useMemo(() => {
    const todayStr = getHKDateString();
    const yest = new Date(); yest.setDate(yest.getDate() - 1);
    const yesterdayStr = getHKDateString(yest);
    const safeName = userName ? userName.trim() : "Guest";

    const currentRunRecord = isRecorded ? (() => {
      const total = results.length;
      const correct = results.filter(r => r.isCorrect).length;
      const bp = calculateBattlePoint(correct, total, totalTime, scope || '');
      return { name: safeName, acc: percentage, time: totalTime, score: correct, total, scope: scope || '', battlePoint: bp };
    })() : null;

    let myStreak = 1;
    const me = findUser(leaderboardData, safeName);
    if (me) {
      const lastStr = safeDateStr(me.lastLogin);
      if (lastStr === todayStr)         myStreak = me.storedStreak;
      else if (lastStr === yesterdayStr) myStreak = me.storedStreak + 1;
      else                               myStreak = 1;
    }

    const { daily, weeklyRank } = computeRankings(leaderboardData, safeName, currentRunRecord);

    return { daily, weeklyRank, currentStreak: myStreak };
  }, [leaderboardData, userName, percentage, totalTime, isRecorded, results, scope]);

  return (
    <div className="w-full max-w-4xl px-4 pb-20 relative">
      <div className="glass-panel p-8 rounded-2xl shadow-xl text-center">

        <button onClick={() => setShowDebug(!showDebug)}
          className="absolute bottom-4 right-4 text-xs text-gray-300 dark:text-gray-600 hover:text-gray-500 dark:hover:text-gray-400" title="數據診斷">
          <i className="fas fa-bug"></i>

        {showDebug && (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" onClick={() => setShowDebug(false)}>
            <div className="bg-white dark:bg-gray-800 p-6 rounded-xl max-w-2xl w-full max-h-[80vh] overflow-auto text-left border border-gray-200 dark:border-gray-700" onClick={e => e.stopPropagation()}>
              <h3 className="font-bold text-red-600 dark:text-red-400 mb-2">數據診斷報告</h3>
              <pre className="text-xs bg-gray-100 dark:bg-gray-900 dark:text-gray-200 p-4 rounded overflow-x-auto">
                {JSON.stringify({
                  frontendDate: getHKDateString(),
                  userName, hasLeaderboardData: !!leaderboardData,
                  streak: currentStreak, currentRankList: daily,
                  pendingSubmitCount, isWrongBookMode,
                  debugInfo
                }, null, 2)}
              </pre>
              <button onClick={() => setShowDebug(false)} className="mt-4 bg-gray-500 dark:bg-gray-600 hover:bg-gray-600 dark:hover:bg-gray-500 text-white px-4 py-2 rounded">關閉</button>
            </div>
          </div>
        )}

        <div className="mb-8">
          {isWrongBookMode ? (
            <>
              <div className="inline-block p-4 rounded-full bg-red-100 dark:bg-red-900/50 mb-4">
                <i className="fas fa-book-bookmark text-4xl text-red-600 dark:text-red-400"></i>
              </div>
              <h2 className="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-2">錯題簿複習完成！</h2>
              {wrongBookRemovedCount > 0 && (
                <div className="bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 rounded-lg p-4 mt-4 mb-4 text-green-700 dark:text-green-300">
