/* ============================================================================
 * 【版本檢查系統】自動偵測新版本並提示用戶刷新
 * ============================================================================ */

const APP_VERSION = "2026.05.15.v36";                  // ⚠️ 每次發佈要手動改
const VERSION_CHECK_URL = "./version.json";
const VERSION_CHECK_INTERVAL = 5 * 60 * 1000;        // 每 5 分鐘檢查一次

// 暴露一個全域 flag，讓 React 組件把當前 gameState 寫進來
window.__APP_STATE__ = { gameState: 'start' };

async function checkForUpdate() {
  try {
    const res = await fetch(`${VERSION_CHECK_URL}?t=${Date.now()}`, {
      cache: 'no-store'
    });
    if (!res.ok) return;
    const data = await res.json();
    if (data.version && data.version !== APP_VERSION) {
      showUpdatePrompt(data.version, data.releaseNote);
    }
  } catch (e) {
    console.warn('[版本檢查] 失敗:', e);
  }
}

function showUpdatePrompt(newVersion, releaseNote) {
  // 避免重複彈出
  if (document.getElementById('app-update-banner')) return;
  window.__APP_PENDING_UPDATE__ = true; 

  // 🆕 判斷用戶是否在答題中（透過 window.__APP_STATE__）
  const isPlaying = window.__APP_STATE__ &&
                    window.__APP_STATE__.gameState === 'playing';

  const mainMsg = isPlaying
    ? `🎉 新版本已發佈 (${newVersion})！答完本局練習後再刷新即可更新`
    : `🎉 發現新版本 (${newVersion})！請立即更新以獲得最新功能`;

  const banner = document.createElement('div');
  banner.id = 'app-update-banner';
  banner.style.cssText = `
    position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
    background: linear-gradient(90deg, #6366f1, #a855f7);
    color: white; padding: 12px 16px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    gap: 12px; flex-wrap: wrap;
    animation: slideDownBanner 0.4s ease-out;
  `;

  // 加入動畫 keyframes（只加一次）
  if (!document.getElementById('app-update-banner-style')) {
    const style = document.createElement('style');
    style.id = 'app-update-banner-style';
    style.textContent = `
      @keyframes slideDownBanner {
        from { transform: translateY(-100%); opacity: 0; }
        to   { transform: translateY(0); opacity: 1; }
      }
    `;
    document.head.appendChild(style);
  }

  banner.innerHTML = `
    <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
      <span style="font-weight: 600;">${mainMsg}</span>
      ${releaseNote ? `<span style="font-size: 12px; opacity: 0.9;">📝 ${releaseNote}</span>` : ''}
    </div>
    <div style="display: flex; gap: 8px; flex-shrink: 0;">
      <button id="app-update-btn" style="
        background: white; color: #6366f1; border: none;
        padding: 6px 16px; border-radius: 6px;
        font-weight: bold; cursor: pointer; font-size: 13px;
        transition: transform 0.15s;
      " onmouseover="this.style.transform='scale(1.05)'"
         onmouseout="this.style.transform='scale(1)'">
        ${isPlaying ? '答完再說' : '立即更新'}
      </button>
      <button id="app-update-later" style="
        background: transparent; color: white;
        border: 1px solid rgba(255,255,255,0.6);
        padding: 6px 12px; border-radius: 6px;
        cursor: pointer; font-size: 13px;
      ">關閉</button>
    </div>
  `;
  document.body.appendChild(banner);

  document.getElementById('app-update-btn').onclick = () => {
    if (isPlaying) {
      // 答題中 → 只關閉橫幅，等答完自然會再次提示
      banner.remove();
    } else {
      forceReload();
    }
  };
  document.getElementById('app-update-later').onclick = () => banner.remove();
}

function forceReload() {
  // 清除所有 caches（若有 service worker）
  if ('caches' in window) {
    caches.keys()
      .then(keys => Promise.all(keys.map(k => caches.delete(k))))
      .finally(() => location.reload(true));
  } else {
    location.reload(true);
  }
}

// 啟動檢查：首次載入 30 秒後開始，之後每 5 分鐘
setTimeout(checkForUpdate, 30000);
setInterval(checkForUpdate, VERSION_CHECK_INTERVAL);

// 🆕 當用戶從其他分頁切回來時，立即檢查一次
document.addEventListener('visibilitychange', () => {

// 🆕 [C1 修復] 只在用戶「回到主畫面 (start)」時才考慮刷新
//     而非離開 playing 就立即刷新（避免中斷結算頁的成績上傳）
window.addEventListener('app-state-changed', () => {
  const st = window.__APP_STATE__;

  // 必要條件：
  // 1. 已經回到 start 主畫面（不是 result/shop/stats 等）
  // 2. 沒有橫幅顯示中
  // 3. 有待更新標記
  if (!st || st.gameState !== 'start') return;
  if (document.getElementById('app-update-banner')) return;
  if (!window.__APP_PENDING_UPDATE__) return;

  // 額外等 1.5 秒，讓離線佇列、錯題簿同步等背景請求有機會完成
  setTimeout(() => {
    // 二次確認：若仍有未上傳的成績，就先不刷新（等下一次回到 start 再試）
    const pending = window.__APP_PENDING_SUBMITS__ || 0;
    if (pending > 0) {
      console.log(`[版本檢查] 仍有 ${pending} 筆成績待上傳，延後刷新`);
      return;
    }
    // 再次檢查標記是否仍存在（避免被其他流程清掉）
    if (!window.__APP_PENDING_UPDATE__) return;
    if (document.getElementById('app-update-banner')) return;

    checkForUpdate();
    forceReload();
  }, 1500);
});

function formatText(text) {
  if (text === null || text === undefined) return '';
  return String(text)
    .replace(/\\r\\n/g, '\n')
    .replace(/\\n/g, '\n')
    .replace(/\\t/g, '    ');
}

function decodeJwtResponse(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(
    atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
  );
  return JSON.parse(jsonPayload);
}

function getHKDateString(dateObj) {
  const baseDate = dateObj || new Date();
  const utc = baseDate.getTime() + (baseDate.getTimezoneOffset() * 60000);
  const hk = new Date(utc + (3600000 * 8));
  const y = hk.getFullYear();
  const m = String(hk.getMonth() + 1).padStart(2, '0');
  const d = String(hk.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatTime(ms) {
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function getQuestionId(q) {
  if (!q) return null;
  if (q.id !== undefined && q.id !== null && q.id !== '') return String(q.id);
  const title = q.title || q.question || '';
  if (!title) return null;
  return `${q.category || ''}::${String(title).slice(0, 80)}`;
}

function shortenName(fullName) {
  if (!fullName) return '';
  return String(fullName)
    .replace(/^\s*[4-6][A-Z]\d+\s*/i, '')
    .replace(/\s*\([\d\-]+\)(\s*[A-Za-z0-9]+)?\s*$/, '')
    .trim();
}

function getStudentForm(fullName) {
  if (!fullName) return null;
  const match = String(fullName).match(/([4-6])[A-Z]\d+/i);
  return match ? match[1] : null;
}

function normalizeNameForMatch(name) {
  if (!name) return '';
  return shortenName(name)
    .toLowerCase()
    .trim()
    .split(/\s+/)
    .filter(Boolean)
    .sort()
    .join(' ');
}

/* 預先正規化老師名稱清單（模組載入時一次） */
const TEACHER_NORMALIZED_SET = new Set(CONFIG.TEACHER_NAMES.map(normalizeNameForMatch));

function isTeacher(name) {
  if (!name || name === '訪客 (未登入)') return false;
  const normalized = normalizeNameForMatch(name);
  return !!normalized && TEACHER_NORMALIZED_SET.has(normalized);
}

function getWeekStartHK(dateObj) {
  const baseDate = dateObj || new Date();
  const utc = baseDate.getTime() + (baseDate.getTimezoneOffset() * 60000);
  const hk = new Date(utc + (3600000 * 8));
  const day = hk.getDay();
  const diff = day === 0 ? 6 : day - 1;
  hk.setDate(hk.getDate() - diff);
  const y = hk.getFullYear();
  const m = String(hk.getMonth() + 1).padStart(2, '0');
  const d = String(hk.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

const BATTLE_STD_TIME_PER_Q_MS = 30 * 1000;

function parseScopeCount(scopeStr) {
  if (!scopeStr || typeof scopeStr !== 'string' || !scopeStr.trim()) return 1;
  let count = 0;
  const parts = scopeStr.split('|');
  for (let i = 0; i < parts.length; i++) {
    const items = parts[i].trim().split(',');
    for (let j = 0; j < items.length; j++) {
      if (items[j].trim().length > 0) count++;
    }
  }
  return Math.max(1, count);
}

function parseScopeChapters(scopeStr) {
  if (!scopeStr || typeof scopeStr !== 'string') return [];
  return scopeStr.split('|').flatMap(p =>
    p.split(',').map(s => s.trim()).filter(Boolean)
  );
}

/* 🆕 縮短 scope 顯示，避免章節過多撐爆 UI */
function formatScopeShort(scopeStr, maxItems = 4) {
  if (!scopeStr) return '';
  const items = scopeStr.split('|').flatMap(p =>
    p.split(',').map(s => s.trim()).filter(Boolean)
  );
  if (items.length === 0) return '';
  if (items.length <= maxItems) return items.join(', ');
  return `${items.slice(0, maxItems).join(', ')} …等 ${items.length} 項`;
}

function calculateBattlePoint(correct, total, timeMs, scopeStr) {
  if (!total || total <= 0 || correct < 0) return 0;
  const baseScore       = correct * 100;
  const accuracy        = correct / total;
  const numCourses      = parseScopeCount(scopeStr);
  const scopeMultiplier = 1 + (numCourses - 1) * 0.15;
  const avgTimePerQMs   = timeMs / total;
  const speedMultiplier = avgTimePerQMs <= 0
    ? 1.5
    : Math.min(1.5, Math.max(1.0, BATTLE_STD_TIME_PER_Q_MS / avgTimePerQMs));
  return Math.round(baseScore * accuracy * scopeMultiplier * speedMultiplier);
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* 🆕 精簡版 safeDateStr：Date 構造與 regex 不會丟例外，無需 try/catch */
function safeDateStr(raw) {
  if (raw === null || raw === undefined) return "";
  const s = String(raw).trim();
  if (!s) return "";

  // 直接解析（ISO 8601 / RFC 2822 等標準格式）
  let d = new Date(s);
  if (!isNaN(d.getTime())) return getHKDateString(d);

  // YYYY/MM/DD 或 YYYY-MM-DD（斜線/連字符分隔，Google Sheet 常見輸出）
  const m1 = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m1) {
    d = new Date(Number(m1[1]), Number(m1[2]) - 1, Number(m1[3]));
    if (!isNaN(d.getTime())) return getHKDateString(d);
  }

  // DD/MM/YYYY 格式（香港日期慣用格式）
  const m2 = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if (m2) {
    d = new Date(Number(m2[3]), Number(m2[2]) - 1, Number(m2[1]));
    if (!isNaN(d.getTime())) return getHKDateString(d);
  }
  return "";
}

/* 🆕 共用 helper：解析一筆紀錄的 score/total 並做範圍驗證 */
function parseScoreTotal(r) {
  const score = parseFloat(String(r[2] || '0').replace(/[^\d.]/g, '').trim()) || 0;
  const total = parseFloat(String(r[3] || '0').replace(/[^\d.]/g, '').trim()) || 0;
  if (total <= 0 || score < 0 || score > total) return null;
  return { score, total };
}

/* 🆕 共用 helper：從記錄物件解析出 HK 日期字串（優先 DateStr，其次 Timestamp）*/
function extractRecordDateStr(r) {
  const rawDate = String(r[7] || '').trim();
  if (rawDate) {
    const ds = safeDateStr(rawDate);
    if (ds) return ds;
  }
  if (r[0]) {
    const parsed = new Date(r[0]);
    if (!isNaN(parsed.getTime())) return getHKDateString(parsed);
  }
  return '';
}

function getLevelInfo(totalQuestions) {
  const { baseXp, increment, maxLevel } = CONFIG.LEVEL;
  let level = 1;
  let currentBoundary = 0;
  let nextBoundary = baseXp;

  while (totalQuestions >= nextBoundary && level < maxLevel) {
    level++;
    currentBoundary = nextBoundary;
    nextBoundary += baseXp + (level - 1) * increment;
  }

  const currentExp = totalQuestions - currentBoundary;
  const expNeeded = nextBoundary - currentBoundary;
  const progressPercent = level >= maxLevel ? 100 : Math.round((currentExp / expNeeded) * 100);
  const questionsToNextLevel = nextBoundary - totalQuestions;

  const tier = LEVEL_TITLES.find(t => level >= t.min);
  const titleName = tier ? tier.name : '生物新手';

  return {
    level,
    title: `Lv.${level} ${titleName}`,
    currentExp,
    expNeeded,
    progressPercent,
    questionsToNextLevel
  };
}

function parseUserData(userArr) {
  if (!userArr) return null;
  const base = {
    name: userArr[0],
    totalQuestions: parseInt(userArr[1]) || 0,
    lastLogin: userArr[2],
    storedStreak: parseInt(userArr[3]) || 0,

  };
  for (let i = 0; i < SHOP_ITEMS.length; i++) {
    const item = SHOP_ITEMS[i];
    base[item.userField] = parseInt(userArr[item.col]) || 0;
  }
  return base;
}

function findUser(leaderboardData, userName) {
  if (!leaderboardData || !leaderboardData.users || !userName) return null;
  const shortTarget = shortenName(userName);
  const u = leaderboardData.users.find(row => shortenName(String(row[0] || '').trim()) === shortTarget);
  return parseUserData(u);
}

function calculateActiveStreak(user, todayStr, yesterdayStr) {
  if (!user) return 0;
  const lastStr = safeDateStr(user.lastLogin);
  if (!lastStr) return 0;

  if (lastStr === todayStr || lastStr === yesterdayStr) return user.storedStreak;

  const [ty, tm, td] = todayStr.split("-").map(Number);
  const [ly, lm, ld] = lastStr.split("-").map(Number);
  if (!ly) return 0;
  const dToday = new Date(ty, tm - 1, td);
  const dLast  = new Date(ly, lm - 1, ld);
  const diffDays = Math.round(Math.abs(dToday - dLast) / (1000 * 3600 * 24));
  if (diffDays > 1 && user.shields >= (diffDays - 1)) return user.storedStreak;
  return 0;
}

function filterTodayMCQRecords(records, todayStr) {
  if (!records) return [];
  const out = [];
  for (let i = 0; i < records.length; i++) {
    const r = records[i];
    const name = String(r[1] || "").trim();
    if (!name || name === "訪客 (未登入)" || name === "Guest") continue;
    const mode = String(r[6] || "").toLowerCase();
    if (!mode.includes('mc')) continue;

    // 優先使用 DateStr 欄位；缺失時再用 Timestamp
    const rowDateStr = String(r[7] || "").trim() === todayStr
      ? todayStr
      : extractRecordDateStr(r);
    if (rowDateStr !== todayStr) continue;

    const acc   = Number(r[5]);
    const time  = Number(r[4]);
    const total = Number(r[3]) || CONFIG.QUESTIONS_PER_SESSION;
    const score = Number(r[2]) || Math.round(acc / 100 * total);
    const scope = String(r[8] || '');
    const battlePoint = calculateBattlePoint(score, total, time, scope);
    out.push({ name, acc, time, score, total, scope, battlePoint });
  }
  return out;
}

function computeRankings(leaderboardData, currentUserName, currentRunRecord, currentRunSubmittedAt) {
  const records = (leaderboardData && leaderboardData.records) || [];
  const users   = (leaderboardData && leaderboardData.users)   || [];
  const todayStr  = getHKDateString();
  const weekStart = getWeekStartHK();

  const userTotalMap = new Map();
  for (let i = 0; i < users.length; i++) {
    const u = users[i];
    if (u[0]) userTotalMap.set(u[0], parseInt(u[1]) || 0);
  }

  // 🆕 [H2 修復] 檢查 currentRunRecord 是否已存在於 records（避免重複計入）
  //     伺服器回傳 records 後，我們剛上傳的成績會出現在裡面；
  //     若仍把 currentRunRecord 加進去，週榜分數會被算兩次。
  let currentRunAlreadyInRecords = false;
  if (currentRunRecord && currentRunSubmittedAt) {
    const targetName  = currentRunRecord.name;
    const targetScore = currentRunRecord.score;
    const targetTotal = currentRunRecord.total;

    for (let i = 0; i < records.length; i++) {
      const r = records[i];
      const rName = String(r[1] || '').trim();
      if (rName !== targetName) continue;

      // 比對 timestamp（容忍 ±90 秒誤差，避免時鐘漂移或 Sheet 寫入延遲）
      const rTs = r[0] ? new Date(r[0]).getTime() : 0;
      if (!rTs || Math.abs(rTs - currentRunSubmittedAt) > 90000) continue;

      const st = parseScoreTotal(r);
      if (!st) continue;

      // 同名 + 時間相近 + 分數/題數相同 → 視為同一局
      if (st.score === targetScore && st.total === targetTotal) {
        currentRunAlreadyInRecords = true;
        break;
      }
    }
  }

  const candidates = filterTodayMCQRecords(records, todayStr);
  // 🆕 [H2 修復] 只在 records 尚未包含本局時才補上
  if (currentRunRecord && !currentRunAlreadyInRecords) candidates.push(currentRunRecord);

  const dailyMap = new Map();
  for (let i = 0; i < candidates.length; i++) {
    const rec = candidates[i];
    const old = dailyMap.get(rec.name);
    if (!old || rec.battlePoint > old.battlePoint) dailyMap.set(rec.name, rec);
  }

  const daily = Array.from(dailyMap.values())
    .map(r => ({ ...r, totalQuestions: userTotalMap.get(r.name) || 0 }))
    .sort((a, b) => b.battlePoint - a.battlePoint)
    .slice(0, 20);

  const weeklyMap = new Map();
  for (let i = 0; i < records.length; i++) {
    const r = records[i];
    const name = String(r[1] || "").trim();
    if (!name || name === "訪客 (未登入)" || name === "Guest") continue;
    const mode = String(r[6] || "").toLowerCase();
    if (!mode.includes('mc')) continue;

    const rowDateStr = extractRecordDateStr(r);
    if (!rowDateStr || rowDateStr < weekStart) continue;

    const score = Number(r[2]) || 0;
    weeklyMap.set(name, (weeklyMap.get(name) || 0) + score);
  }

  // 🆕 [H2 修復] 同樣加上去重判斷
  if (currentRunRecord && !currentRunAlreadyInRecords &&
      currentRunRecord.name !== "訪客 (未登入)" && currentRunRecord.name !== "Guest") {
    weeklyMap.set(
      currentRunRecord.name,
      (weeklyMap.get(currentRunRecord.name) || 0) + (currentRunRecord.score || 0)
    );
  }

  const weeklyRank = Array.from(weeklyMap.entries())
    .map(([name, correctCount]) => ({
      name,
      correctCount,
      totalQuestions: userTotalMap.get(name) || 0
    }))
    .sort((a, b) => b.correctCount - a.correctCount || b.totalQuestions - a.totalQuestions)
    .slice(0, 20);

  return { daily, weeklyRank, todayStr, weekStart, currentRunAlreadyInRecords };
}

function getStudentRecords(records, userName) {
  if (!records || !userName) return [];
  const targetRaw   = String(userName).trim();
  const targetShort = shortenName(targetRaw);
  const targetRawLC   = targetRaw.toLowerCase();
  const targetShortLC = targetShort.toLowerCase();

  const out = [];
  for (let i = 0; i < records.length; i++) {
    const r = records[i];
    const rawName = String(r[1] || '').trim();
    const shortName = shortenName(rawName);
    const sameUser =
      rawName === targetRaw ||
      shortName === targetShort ||
      rawName.toLowerCase() === targetRawLC ||
      shortName.toLowerCase() === targetShortLC;
    if (!sameUser) continue;
    const mode = String(r[6] || '').toLowerCase();
    if (!mode.includes('mc')) continue;
    out.push(r);
  }
  return out;
}

function computeChapterStats(records) {
  if (!records || records.length === 0) return [];
  const stats = {};

  for (let i = 0; i < records.length; i++) {
    const r = records[i];
    const st = parseScoreTotal(r);
    if (!st) continue;
    const { score, total } = st;

    const scope = String(r[8] || '');
    const chapters = parseScopeChapters(scope);
    if (chapters.length === 0) continue;

    const perCorrect = score / chapters.length;
    const perTotal   = total / chapters.length;
    const confidenceWeight = 1 / chapters.length;

    for (let j = 0; j < chapters.length; j++) {
      const ch = chapters[j];
      let s = stats[ch];
      if (!s) {
        s = stats[ch] = { correct: 0, total: 0, sessions: 0, confidence: 0 };
      }
      s.correct    += perCorrect;
      s.total      += perTotal;
      s.sessions   += 1;
      s.confidence += confidenceWeight;
    }
  }

  /* 🆕 預計算章節數字，避免在排序比較器中重複執行 regex */
  const result = Object.entries(stats).map(([chapter, s]) => {
    let accuracy = 0;
    if (s.total > 0) {
      accuracy = Math.max(0, Math.min(100, Math.round((s.correct / s.total) * 100)));
    }
    let reliability = 'low';
    if (s.confidence >= 3)      reliability = 'high';
    else if (s.confidence >= 1) reliability = 'medium';

    const m = chapter.match(/Ch\.(\d+)/);
    const chapterNum = m ? parseInt(m[1]) : null;

    return {
      chapter,
      chapterNum,
      accuracy,
      total: Math.round(s.total),
      attempts: s.sessions,
      reliability,
      confidenceScore: Math.round(s.confidence * 10) / 10
    };
  });

  result.sort((a, b) => {
    if (a.chapterNum !== null && b.chapterNum !== null) return a.chapterNum - b.chapterNum;
    if (a.chapterNum !== null) return -1;
    if (b.chapterNum !== null) return 1;
    return a.chapter.localeCompare(b.chapter);
  });

  return result;
}

/* 🆕 computeDailyBestBattle：每日取最高戰況分數（battlePoint）的一次練習來繪線圖 */
function computeDailyBestBattle(records, days) {
  const map = new Map();
  const now = new Date();

  for (let i = 0; i < (records || []).length; i++) {
    const r = records[i];
    const dateStr = extractRecordDateStr(r);
    if (!dateStr) continue;

    const st = parseScoreTotal(r);
    if (!st) continue;

    const timeMs  = Number(r[4]) || 0;
    const scope   = String(r[8] || '');
    const bp      = calculateBattlePoint(st.score, st.total, timeMs, scope);
    const accuracy = st.total > 0
      ? Math.max(0, Math.min(100, Math.round((st.score / st.total) * 100)))
      : 0;

    let s = map.get(dateStr);
    if (!s) {
      s = { battlePoint: -1, accuracy: 0, correct: 0, total: 0, attempts: 0 };
      map.set(dateStr, s);
    }
    s.attempts += 1;
    if (bp > s.battlePoint) {
      s.battlePoint = bp;
      s.accuracy    = accuracy;
      s.correct     = st.score;
      s.total       = st.total;
    }
  }

  const result = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const dStr = getHKDateString(d);
    const s = map.get(dStr);

    result.push({
      date:        dStr,
      label:       `${d.getMonth() + 1}/${d.getDate()}`,
      battlePoint: (s && s.battlePoint >= 0) ? s.battlePoint : null,
      accuracy:    (s && s.battlePoint >= 0) ? s.accuracy    : null,
      attempts:    s ? s.attempts : 0,
      correct:     s ? s.correct  : 0,
      total:       s ? s.total    : 0
    });
  }
  return result;
}

function collectImageUrls(question) {
  if (!question || typeof question !== 'object') return [];
  const urls = [];
  const keys = Object.keys(question);
  for (let i = 0; i < keys.length; i++) {
    const key = keys[i];
    const val = question[key];
    if (typeof key === 'string' && key.endsWith('_img') && typeof val === 'string' && val.trim()) {
      urls.push(val);
    }
  }
  return urls;
}

/* 🆕 真正的 LRU 圖片快取：存取時會重新插入，真正淘汰最久未用 */
const imageCache = new Map();
function preloadImage(url) {
  if (!url) return;
  if (imageCache.has(url)) {
    const existing = imageCache.get(url);
    imageCache.delete(url);
    imageCache.set(url, existing);
    return;
  }
  if (imageCache.size >= CONFIG.PRELOAD_CACHE_LIMIT) {
    imageCache.delete(imageCache.keys().next().value);
  }
  const img = new Image();
  img.src = url;
  imageCache.set(url, img);
}
function evictImageCache(url) {
  imageCache.delete(url);
}

const ToastContext = createContext(() => {});

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const idRef = useRef(0);

  const showToast = useCallback((message, type = 'info', duration = 3500) => {
    const id = ++idRef.current;
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => {
      setToasts(prev => prev.filter(t => t.id !== id));
    }, duration);
  }, []);

  const removeToast = useCallback((id) => {
    setToasts(prev => prev.filter(t => t.id !== id));
  }, []);

  return (
    <ToastContext.Provider value={showToast}>
      {children}
      <div className="fixed top-4 right-4 z-[1200] flex flex-col gap-2 items-end pointer-events-none max-w-[90vw]">
        <AnimatePresence>
          {toasts.map(t => {
            const style = TOAST_TYPE_STYLE[t.type] || TOAST_TYPE_STYLE.info;
            return (
              <motion.div
                key={t.id}
                initial={{ x: 400, opacity: 0 }}
                animate={{ x: 0, opacity: 1 }}
                exit={{ x: 400, opacity: 0 }}
                transition={{ type: 'spring', stiffness: 300, damping: 25 }}
                className={`${style.bg} ${style.border} text-white px-4 py-3 rounded-xl shadow-lg border flex items-start gap-3 pointer-events-auto min-w-[260px] max-w-sm`}
              >
                <i className={`fas ${style.icon} text-lg mt-0.5 flex-shrink-0`}></i>
                <div className="flex-1 text-sm leading-snug whitespace-pre-line">{t.message}</div>
                <button onClick={() => removeToast(t.id)} className="text-white/80 hover:text-white flex-shrink-0">
                  <i className="fas fa-times text-xs"></i>
                </button>
              </motion.div>
            );
          })}
        </AnimatePresence>
      </div>
    </ToastContext.Provider>
  );
}

function useDarkMode() {
  const [isDark, setIsDark] = useState(() => {
    try { return localStorage.getItem(CONFIG.STORAGE.darkMode) === 'true'; }
    catch (e) { return false; }
  });
  useEffect(() => {
    try {
      document.documentElement.classList.toggle('dark', isDark);
      localStorage.setItem(CONFIG.STORAGE.darkMode, isDark ? 'true' : 'false');
    } catch (e) {}
  }, [isDark]);
  return [isDark, setIsDark];
}

/* 🆕 共用 Hook：偵測 <html> 上的 dark class 變化，供圖表元件使用 */
function useDarkModeClass() {
  const [isDark, setIsDark] = useState(() =>
    typeof document !== 'undefined' &&
    document.documentElement.classList.contains('dark')
  );
  useEffect(() => {
    if (typeof document === 'undefined') return;
    const html = document.documentElement;
    const sync = () => setIsDark(html.classList.contains('dark'));
    sync();
    const mo = new MutationObserver(sync);
    mo.observe(html, { attributes: true, attributeFilter: ['class'] });
    return () => mo.disconnect();
  }, []);
  return isDark;
}

function useWrongBook(userName, leaderboardData, isOnline, refetchLeaderboard) {
  const storageKey = useMemo(() => {
    if (!userName || userName === "訪客 (未登入)") return null;
    return CONFIG.STORAGE.wrongBookPrefix + userName;
  }, [userName]);

  const [wrongBook, setWrongBook] = useState({});
  const pendingOpsRef = useRef([]);
  const hasSyncedFromCloudRef = useRef(false);

  useEffect(() => {
    hasSyncedFromCloudRef.current = false;
    if (!storageKey) {
      setWrongBook({});
      return;
    }
    try {
      const raw = localStorage.getItem(storageKey);
      setWrongBook(raw ? JSON.parse(raw) : {});
    } catch (e) {
      setWrongBook({});
    }
  }, [storageKey]);

  useEffect(() => {
    if (!userName || userName === "訪客 (未登入)") return;
    if (!leaderboardData || leaderboardData.wrongBook === undefined) return;

    const cloudBook = leaderboardData.wrongBook || {};

    // 🆕 [跨裝置同步修復] 以雲端為唯一真實來源(single source of truth)
    //     只額外保留「真正還沒上傳成功的離線新增」,避免把
    //     「其他裝置已刪除/掌握的題目」誤認為「本地離線新增」而留下來
    const pendingAdds = {};
    for (let i = 0; i < pendingOpsRef.current.length; i++) {
      const op = pendingOpsRef.current[i];
      if (op && op.action === 'wrongbook_add' && op.questionId && op.questionData) {
        // 若雲端已經有同 ID(代表這筆其實已上傳成功,只是 ack 沒回來)就跳過
        if (cloudBook[op.questionId]) continue;

        pendingAdds[op.questionId] = {
          question: op.questionData,
          correctStreak: 0,
          wrongCount: 1,
          addedAt: Date.now(),
          lastWrongAt: Date.now()
        };
      }
    }

    // 🆕 對雲端題目做完整性檢查:若雲端版殘缺但本地有完整版,保留本地的 question 欄位
    //     (進度/次數仍以雲端為準,避免兩台裝置進度衝突)
    setWrongBook(prev => {
      const merged = {};
      const cloudIds = Object.keys(cloudBook);
      for (let i = 0; i < cloudIds.length; i++) {
        const id = cloudIds[i];
        const cloudEntry = cloudBook[id];
        const localEntry = prev ? prev[id] : null;

        const cloudQ = cloudEntry.question;
        const localQ = localEntry ? localEntry.question : null;

        let finalQuestion = cloudQ;
        if (localQ && isQuestionComplete(localQ) && !isQuestionComplete(cloudQ)) {
          finalQuestion = localQ;
        }
        merged[id] = { ...cloudEntry, question: finalQuestion };
      }

      // 疊加真正待上傳的離線新增
      return { ...merged, ...pendingAdds };
    });

    hasSyncedFromCloudRef.current = true;
  }, [leaderboardData, userName]);

  useEffect(() => {
    if (!storageKey) return;
    try { localStorage.setItem(storageKey, JSON.stringify(wrongBook)); }
    catch (e) {}
  }, [wrongBook, storageKey]);

  const sendOp = useCallback(async (action, extra) => {
    if (!userName || userName === "訪客 (未登入)") return;
    const body = { action, name: userName, ...extra };

    if (!isOnline) {
      pendingOpsRef.current.push(body);
      return;
    }
    try {
      await fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      });
    } catch (e) {
      console.warn("錯題簿同步失敗，排進佇列:", e);
      pendingOpsRef.current.push(body);
    }
  }, [userName, isOnline]);

  useEffect(() => {
    if (!isOnline || !userName || userName === "訪客 (未登入)") return;
    if (pendingOpsRef.current.length === 0) return;

    const queue = pendingOpsRef.current.slice();
    pendingOpsRef.current = [];

    Promise.all(queue.map(op =>
      fetch(CONFIG.GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(op)
      }).catch(() => { pendingOpsRef.current.push(op); })
    )).then(() => {
      if (refetchLeaderboard && pendingOpsRef.current.length === 0) {
        setTimeout(refetchLeaderboard, 1500);
      }
    });
  }, [isOnline, userName, refetchLeaderboard]);

  const addWrong = useCallback((question) => {
    const id = getQuestionId(question);
    if (!id || !userName || userName === "訪客 (未登入)") return;

    // 🆕 深拷貝，避免後續題庫物件被修改影響錯題簿
    let snapshot;
    try {
      snapshot = JSON.parse(JSON.stringify(question));
    } catch (e) {
      snapshot = { ...question };
    }

    // 🆕 存入前驗證完整性，若殘缺直接警告（不寫入錯題簿）
    if (!isQuestionComplete(snapshot)) {
      console.warn('[WrongBook] 題目資料不完整，跳過加入錯題簿:', snapshot);
      return;
    }

    setWrongBook(prev => {
      const existing = prev[id];
      // 🆕 若本地已有「完整版」，保留原 question（不被殘缺版覆蓋）
      const keptQuestion = existing && isQuestionComplete(existing.question)
        ? existing.question
        : snapshot;
      return {
        ...prev,
        [id]: {
          question: keptQuestion,
          correctStreak: 0,
          wrongCount: existing ? (existing.wrongCount || 0) + 1 : 1,
          addedAt: existing ? existing.addedAt : Date.now(),
          lastWrongAt: Date.now()
        }
      };
    });
    sendOp('wrongbook_add', { questionId: id, questionData: snapshot });
}, [userName, sendOp]);

  const recordReviewAnswer = useCallback((question, isCorrect) => {
    const id = getQuestionId(question);
    if (!id) return { removed: false, newStreak: 0 };

    // 🆕 用 ref 在 setState callback 外捕獲結果,避免把 wrongBook 列入依賴
    //     這樣 callback 不會在每次答題後重建,FlashCard 也不會被迫重新 render
    let info = { removed: false, newStreak: 0 };

    setWrongBook(prev => {
      const entry = prev[id];
      if (!entry) {
        info = { removed: false, newStreak: 0 };
        return prev;
      }

      if (isCorrect) {
        const newStreak = (entry.correctStreak || 0) + 1;
        if (newStreak >= CONFIG.WRONG_BOOK_MASTERY_THRESHOLD) {
          info = { removed: true, newStreak };
          const { [id]: _, ...rest } = prev;
          return rest;
        } else {
          info = { removed: false, newStreak };
          return {
            ...prev,
            [id]: { ...entry, correctStreak: newStreak, lastReviewAt: Date.now() }
          };
        }
      } else {
        info = { removed: false, newStreak: 0 };
        return {
          ...prev,
          [id]: { ...entry, correctStreak: 0, lastReviewAt: Date.now(), lastWrongAt: Date.now() }
        };
      }
    });

    sendOp('wrongbook_review', {
      questionId: id,
      isCorrect,
      threshold: CONFIG.WRONG_BOOK_MASTERY_THRESHOLD
    });

    return info;
  }, [sendOp]);

  const removeFromBook = useCallback((questionId) => {
    setWrongBook(prev => {
      const { [questionId]: _, ...rest } = prev;
      return rest;
    });
    sendOp('wrongbook_remove', { questionId });
  }, [sendOp]);

  const count = Object.keys(wrongBook).length;
  return { wrongBook, count, addWrong, recordReviewAnswer, removeFromBook };
}

function useGoogleSignIn(userName, onSignIn) {
  const toast = useToast();
  useEffect(() => {
    if (userName) return;
    let attempts = 0;
    let timer;
    const tryInit = () => {
      attempts++;
      if (attempts > CONFIG.GOOGLE_SIGNIN_MAX_ATTEMPTS) {
        clearInterval(timer);
        console.warn("Google Sign-In 載入失敗：超過最大嘗試次數");
        toast("Google 登入服務載入失敗，請檢查網路或廣告攔截器後重新整理頁面", "warning", 6000);
        return;
      }

      const btn = document.getElementById("googleSignInDiv");
      if (!window.google || !btn) return;

      window.google.accounts.id.initialize({
        client_id: CONFIG.GOOGLE_CLIENT_ID,
        hosted_domain: CONFIG.ALLOWED_EMAIL_DOMAIN.replace('@', ''),
        auto_select: true,
        callback: (response) => {
          const payload = decodeJwtResponse(response.credential);
          if (payload.email && payload.email.endsWith(CONFIG.ALLOWED_EMAIL_DOMAIN)) {
            onSignIn(payload.name);
            if (window.google) window.google.accounts.id.cancel();
          } else {
            toast(`登入失敗：請使用學校的 ${CONFIG.ALLOWED_EMAIL_DOMAIN} 帳號登入`, "error", 5000);
            window.google.accounts.id.revoke(payload.email, () => {});
          }
        }
      });
      window.google.accounts.id.renderButton(btn, { theme: "outline", size: "large", width: "100%", text: "continue_with" });
      window.google.accounts.id.prompt();
      clearInterval(timer);
    };
    timer = setInterval(tryInit, 100);
    return () => clearInterval(timer);
  }, [userName, onSignIn, toast]);
}

function useOnlineStatus() {
  const [isOnline, setIsOnline] = useState(
    typeof navigator !== 'undefined' ? navigator.onLine : true
  );
  const [justReconnected, setJustReconnected] = useState(false);

  useEffect(() => {
    const handleOnline = () => {
      setIsOnline(true);
      setJustReconnected(true);
      setTimeout(() => setJustReconnected(false), 3000);
    };
    const handleOffline = () => {
      setIsOnline(false);
      setJustReconnected(false);

    window.addEventListener('online', handleOnline);
    window.addEventListener('offline', handleOffline);
    return () => {
      window.removeEventListener('online', handleOnline);

    };
  }, []);

  return { isOnline, justReconnected };
}

function useAntiCheat(gameState, currentIndex, isWrongBookMode) {
  const toast = useToast();
  const [tabSwitchCount, setTabSwitchCount] = useState(0);
  const questionStartTimeRef = useRef(Date.now());
  const perQuestionTimesRef  = useRef([]);
  const hasWarnedRef         = useRef(false);

  useEffect(() => {
    if (gameState !== 'playing' || isWrongBookMode) return;

    const handleVisibility = () => {
      if (document.hidden) {
        setTabSwitchCount(c => c + 1);
      } else if (CONFIG.ANTI_CHEAT.warnOnTabSwitch && !hasWarnedRef.current) {
        toast('⚠️ 偵測到離開頁面！請勿切換視窗或查閱外部資料，否則本次成績可能不被記錄。', 'warning', 5000);
        hasWarnedRef.current = true;
        setTimeout(() => { hasWarnedRef.current = false; }, 10000);
      }
    };

    const handleBlur = () => {
      if (!document.hidden) setTabSwitchCount(c => c + 1);
    };

    document.addEventListener('visibilitychange', handleVisibility);
    window.addEventListener('blur', handleBlur);
    return () => {
      document.removeEventListener('visibilitychange', handleVisibility);
      window.removeEventListener('blur', handleBlur);
    };
  }, [gameState, isWrongBookMode, toast]);

  useEffect(() => {
    if (gameState === 'playing') {
      questionStartTimeRef.current = Date.now();
    }
  }, [currentIndex, gameState]);

  const recordAnswerTime = useCallback(() => {
    const elapsed = Date.now() - questionStartTimeRef.current;
    perQuestionTimesRef.current.push(elapsed);
    questionStartTimeRef.current = Date.now();
  }, []);

  const resetAntiCheat = useCallback(() => {
    setTabSwitchCount(0);
    perQuestionTimesRef.current = [];
    questionStartTimeRef.current = Date.now();
    hasWarnedRef.current = false;
  }, []);

  const getCheatReport = useCallback((timeUsed, accuracy) => {
  const reasons = [];
  const AC = CONFIG.ANTI_CHEAT;

  // 🆕 [C3 修復] 拆成兩個獨立條件：時間過短「或」正確率過低都算可疑
  //     原本用 && 只在「又快又錯」時才擋；現在「亂蒙到 50% 但 10 秒答完」也會被擋
  if (timeUsed <= AC.minTimeMs) {
    reasons.push(`整局時間過短（${(timeUsed/1000).toFixed(1)} 秒，低於最低 ${AC.minTimeMs/1000} 秒門檻）`);
  }
  if (accuracy < AC.minAccuracy) {
    reasons.push(`正確率過低（${(accuracy*100).toFixed(1)}%，低於最低 ${AC.minAccuracy*100}% 門檻）`);
  }

  let tooFast = 0;
  const times = perQuestionTimesRef.current;
  for (let i = 0; i < times.length; i++) {
    if (times[i] < AC.minTimePerQuestionMs) tooFast++;
  }
  if (tooFast >= AC.maxTooFastQuestions) {
    reasons.push(`有 ${tooFast} 題在 ${AC.minTimePerQuestionMs}ms 內秒答`);
  }

  if (tabSwitchCount > AC.maxTabSwitches) {
    reasons.push(`遊戲期間切換頁面/視窗 ${tabSwitchCount} 次`);
  }

  return {
    isSuspicious: reasons.length > 0,
    reasons,
    stats: { tabSwitchCount, tooFastCount: tooFast, timeUsed, accuracy }
  };
}, [tabSwitchCount]);

  return { tabSwitchCount, recordAnswerTime, resetAntiCheat, getCheatReport };  // 🆕 補這行
}

const LoadingImage = memo(function LoadingImage({
  src,
  alt = '',
  className = '',
  onClick,
  placeholderClassName = '',
  minHeight = 'min-h-[80px]',
  refreshKey = 0
}) {
  const MAX_RETRIES = 3;
  const [renderKey, setRenderKey] = useState(0);
  const [status, setStatus] = useState('loading');
  const retryCountRef = useRef(0);
  const prevSignalRef = useRef(`${src}::${refreshKey}`);
  const prevSrcRef    = useRef(src);

  useEffect(() => {
    const signal = `${src}::${refreshKey}`;
    if (signal === prevSignalRef.current) return;
    prevSignalRef.current = signal;

    if (!src) { setStatus('error'); return; }

    const srcChanged = src !== prevSrcRef.current;
    prevSrcRef.current = src;

    retryCountRef.current = srcChanged ? 0 : Math.min(retryCountRef.current + 1, MAX_RETRIES);

    setStatus('loading');
    setRenderKey(k => k + 1);
  }, [src, refreshKey]);

  if (!src) return null;

  const bust = retryCountRef.current > 0
    ? `${src.includes('?') ? '&' : '?'}_retry=${retryCountRef.current}`
    : '';
  const actualSrc = `${src}${bust}`;

  const handleRetry = (e) => {
    e.stopPropagation();
    if (retryCountRef.current >= MAX_RETRIES) return;
    retryCountRef.current += 1;
    setStatus('loading');
    setRenderKey(k => k + 1);
  };

  const retriesLeft = MAX_RETRIES - retryCountRef.current;

  return (
    <div className={`relative inline-flex items-center justify-center ${placeholderClassName}`}>
      {status === 'loading' && (
        <div className={`flex flex-col items-center justify-center ${minHeight} min-w-[120px] px-4 py-3 bg-gray-100 dark:bg-gray-700/60 rounded border border-dashed border-gray-200 dark:border-gray-600 text-gray-400 dark:text-gray-400 skeleton-pulse`}>
          <i className="fas fa-image text-2xl mb-1 opacity-30"></i>
          <span className="text-xs">圖片加載中...</span>
        </div>
      )}
      {status === 'error' && (
        <div className={`flex flex-col items-center justify-center ${minHeight} min-w-[140px] px-4 py-3 bg-red-50 dark:bg-red-900/20 rounded border border-dashed border-red-200 dark:border-red-800 text-red-500 dark:text-red-300`}>
          <i className="fas fa-image text-lg mb-1"></i>
          <span className="text-xs mb-2">圖片無法載入</span>
          {retriesLeft > 0 ? (
            <button
              type="button"
              onClick={handleRetry}
              className="text-xs bg-red-100 dark:bg-red-900/50 hover:bg-red-200 dark:hover:bg-red-800 text-red-700 dark:text-red-300 px-3 py-1 rounded-full font-medium transition-colors flex items-center gap-1 border border-red-200 dark:border-red-700"
              title="重新加載此圖片">
              <i className="fas fa-rotate-right"></i>
              重新加載（剩 {retriesLeft} 次）
            </button>
          ) : (
            <span className="text-[10px] text-red-400 dark:text-red-500">已達重試上限</span>
          )}
        </div>
      )}
      <img
        key={renderKey}
        src={actualSrc}
        alt={alt}
        className={className}
        onClick={onClick}
        onLoad={() => setStatus('loaded')}
        onError={() => setStatus('error')}
        style={{ display: status === 'loaded' ? '' : 'none' }}
      />
    </div>
  );
});

const DonutChart = memo(function DonutChart({ correct, total, size = 160 }) {
  if (total === 0) return <div className="text-center text-gray-400 dark:text-gray-500 py-8 text-sm">暫無數據</div>;
  const pct = correct / total;
  const r = size / 2 - 14;
  const cx = size / 2, cy = size / 2;
  const C = 2 * Math.PI * r;

  return (
    <div className="relative inline-block" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90" style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={cx} cy={cy} r={r} fill="none" strokeWidth="14"
                className="stroke-red-100 dark:stroke-red-900/40" />
        <circle cx={cx} cy={cy} r={r} fill="none" strokeWidth="14" strokeLinecap="round"
                strokeDasharray={`${pct * C} ${C}`}
                className={pct >= 0.8 ? "stroke-green-500" : pct >= 0.6 ? "stroke-yellow-500" : "stroke-red-500"} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="text-3xl font-bold text-gray-800 dark:text-gray-100">{Math.round(pct * 100)}%</div>
        <div className="text-xs text-gray-500 dark:text-gray-400">{correct}/{total}</div>
      </div>
    </div>
  );
});

const RadarChart = memo(function RadarChart({ data, size = 320 }) {
  if (!data || data.length < 3) {
    return <div className="text-center text-gray-400 dark:text-gray-500 py-8 text-sm">
      需要至少 3 個章節的練習紀錄才能繪製雷達圖
    </div>;
  }
  const maxPoints = 10;
  const points = data.slice(0, maxPoints);
  const n = points.length;
  const cx = size / 2, cy = size / 2;
  const R = size / 2 - 48;
  const rings = [20, 40, 60, 80, 100];

  const getPoint = (i, pct) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    return {
      x: cx + R * (pct / 100) * Math.cos(angle),
      y: cy + R * (pct / 100) * Math.sin(angle)
    };
  };

  const dataPoints = points.map((p, i) => getPoint(i, p.accuracy));
  const polygonPath = dataPoints.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="max-w-full">
      {rings.map(r => (
        <polygon key={r}
          points={points.map((_, i) => {
            const pt = getPoint(i, r);
            return `${pt.x.toFixed(1)},${pt.y.toFixed(1)}`;
          }).join(' ')}
          fill="none"
          className="stroke-gray-200 dark:stroke-gray-700"
          strokeWidth="1" />
      ))}
      {points.map((_, i) => {
        const pt = getPoint(i, 100);
        return <line key={i} x1={cx} y1={cy} x2={pt.x} y2={pt.y}
                     className="stroke-gray-200 dark:stroke-gray-700" strokeWidth="1" />;
      })}
      <polygon points={polygonPath} fill="rgba(99, 102, 241, 0.25)"
               className="stroke-indigo-500" strokeWidth="2" strokeLinejoin="round" />
      {dataPoints.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="4"
                className="fill-indigo-600 stroke-white dark:stroke-gray-800" strokeWidth="2" />
      ))}
      {points.map((p, i) => {
        const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
        const labelR = R + 22;
        const lx = cx + labelR * Math.cos(angle);
        const ly = cy + labelR * Math.sin(angle);
        return (
          <g key={i}>
            <text x={lx} y={ly - 4} textAnchor="middle" dominantBaseline="middle"
                  className="fill-gray-700 dark:fill-gray-300" fontSize="11" fontWeight="600">
              {p.chapter}
            </text>
            <text x={lx} y={ly + 8} textAnchor="middle" dominantBaseline="middle"
                  className="fill-indigo-500 dark:fill-indigo-400" fontSize="10" fontWeight="700">
              {p.accuracy}%
            </text>
          </g>
        );
      })}
    </svg>
  );
});

const LineChart = memo(function LineChart({ data, height = 240 }) {
  const isDark = useDarkModeClass();

  const C = isDark
    ? { grid: '#374151', text: '#9ca3af', line: '#818cf8',
        area: 'rgba(129,140,248,0.18)', dot: '#818cf8',
        dotStroke: '#1f2937', empty: '#4b5563',
        label: '#a5b4fc', muted: '#6b7280' }
    : { grid: '#e5e7eb', text: '#6b7280', line: '#6366f1',
        area: 'rgba(99,102,241,0.15)', dot: '#6366f1',
        dotStroke: '#ffffff', empty: '#d1d5db',
        label: '#4338ca', muted: '#9ca3af' };

  if (!data || data.length === 0) {
    return (
      <div className="text-center text-gray-400 dark:text-gray-500 py-8 text-sm">
        暫無數據
      </div>
    );
  }

  /* 動態 Y 軸上限：取最高 battlePoint，向上取整到美觀刻度 */
  let maxBP = 0;
  for (let i = 0; i < data.length; i++) {
    const v = data[i].battlePoint;
    if (v != null && v > maxBP) maxBP = v;
  }
  const rawMax = maxBP <= 0 ? 200 : maxBP;
  const magnitude = Math.pow(10, Math.floor(Math.log10(rawMax)));
  const yMax = Math.ceil(rawMax / magnitude) * magnitude;
  const gridValues = [0, 0.25, 0.5, 0.75, 1.0].map(f => Math.round(f * yMax));

  const width  = Math.max(500, data.length * 44);
  const padding = { top: 32, right: 24, bottom: 40, left: 52 };
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;

  const multi = data.length > 1;
  const xStep = multi ? innerW / (data.length - 1) : 0;
  const getX  = (i) => multi ? padding.left + i * xStep : padding.left + innerW / 2;
  const getY  = (val) => padding.top + innerH * (1 - val / yMax);

  const indexed = data.map((d, i) => ({ ...d, __i: i }));
  const valid = [];
  for (let i = 0; i < indexed.length; i++) {
    const d = indexed[i];
    if (typeof d.battlePoint === 'number' && d.battlePoint !== null && isFinite(d.battlePoint)) {
      valid.push(d);
    }
  }

  const pathD = valid.length > 0
    ? valid.map((d, idx) =>
        `${idx === 0 ? 'M' : 'L'} ${getX(d.__i).toFixed(2)} ${getY(d.battlePoint).toFixed(2)}`
      ).join(' ')
    : '';

  const areaD = valid.length >= 2
    ? `${pathD} L ${getX(valid[valid.length - 1].__i).toFixed(2)} ${getY(0).toFixed(2)} L ${getX(valid[0].__i).toFixed(2)} ${getY(0).toFixed(2)} Z`
    : '';

  const labelStep = Math.max(1, Math.ceil(data.length / 10));

  return (
    <div className="overflow-x-auto custom-scrollbar">
      <svg
        width={width}
        height={height}
        viewBox={`0 0 ${width} ${height}`}
        style={{ display: 'block', minWidth: '100%' }}
      >
        {gridValues.map(v => (
          <g key={`grid-${v}`}>
            <line
              x1={padding.left} y1={getY(v)}
              x2={width - padding.right} y2={getY(v)}
              stroke={C.grid} strokeWidth="1" strokeDasharray="2,3"
            />
            <text
              x={padding.left - 6} y={getY(v)}
              textAnchor="end" dominantBaseline="middle"
              fill={C.text} fontSize="10"
            >
              {v}
            </text>
          </g>
        ))}

        {data.map((d, i) => (i % labelStep === 0) && (
          <text
            key={`lbl-${i}`}
            x={getX(i)} y={height - padding.bottom + 18}
            textAnchor="middle"
            fill={C.text} fontSize="10"
          >
            {d.label}
          </text>
        ))}

        {indexed
          .filter(d => d.battlePoint === null || d.battlePoint === undefined)
          .map(d => (
            <circle
              key={`empty-${d.__i}`}
              cx={getX(d.__i)} cy={getY(0)} r="2.5"
              fill={C.empty} opacity="0.7"
            >
              <title>{d.date}：未練習</title>
            </circle>
          ))
        }

        {areaD && <path d={areaD} fill={C.area} stroke="none" />}

        {valid.length >= 2 && (
          <path
            d={pathD} fill="none"
            stroke={C.line} strokeWidth="2.5"
            strokeLinecap="round" strokeLinejoin="round"
          />
        )}

        {valid.map(d => {
          const x = getX(d.__i);
          const y = getY(d.battlePoint);
          const labelY = y - 14 < padding.top ? y + 18 : y - 14;
          return (
            <g key={`pt-${d.__i}`}>
              <circle
                cx={x} cy={y} r="5"
                fill={C.dot} stroke={C.dotStroke} strokeWidth="2"
              >
                <title>
                  {d.date}：戰況最高分 {d.battlePoint}（正確率 {d.accuracy}%，{d.attempts} 次練習，{Math.round(d.correct)}/{Math.round(d.total)} 題）
                </title>
              </circle>
              <text
                x={x} y={labelY} textAnchor="middle"
                fill={C.label} fontSize="11" fontWeight="700"
              >
                {d.battlePoint}
              </text>
            </g>
          );
        })}

        {valid.length === 0 && (
          <g>
            <text
              x={width / 2} y={height / 2 - 8}
              textAnchor="middle" dominantBaseline="middle"
              fill={C.muted} fontSize="14" fontWeight="600"
            >
              📭 所選時間範圍內沒有練習紀錄
            </text>
            <text
              x={width / 2} y={height / 2 + 14}
              textAnchor="middle" dominantBaseline="middle"
              fill={C.empty} fontSize="11"
            >
              完成一局練習後，這裡就會出現你的曲線！
            </text>
          </g>
        )}
      </svg>
    </div>
  );
});

const ChapterMasteryGrid = memo(function ChapterMasteryGrid({ data }) {
  if (!data || data.length === 0) {
    return <div className="text-center text-gray-400 dark:text-gray-500 py-6 text-sm">暫無數據</div>;
  }

  const getCellClass = (d) => {
    if (d.reliability === 'low') {
      return 'bg-gray-100 text-gray-500 border-gray-200 dark:bg-gray-700/50 dark:text-gray-400 dark:border-gray-600';
    }
    if (d.reliability === 'medium') {

/* 🆕 計算過去 N 天的每日活躍趨勢（學生數、答題數、平均正確率） */
function computeDailyTrend(records, days) {
  const map = new Map();
  for (let i = 0; i < (records || []).length; i++) {
    const r = records[i];
    const name = String(r[1] || '').trim();
    if (!name || name === '訪客 (未登入)' || name === 'Guest') continue;
    if (isTeacher(name)) continue;
    const mode = String(r[6] || '').toLowerCase();
    if (!mode.includes('mc')) continue;
    const dateStr = extractRecordDateStr(r);
    if (!dateStr) continue;
    const st = parseScoreTotal(r);
    if (!st) continue;

    let s = map.get(dateStr);
    if (!s) {
      s = { students: new Set(), questions: 0, correct: 0, attempts: 0 };
      map.set(dateStr, s);
    }
    s.students.add(shortenName(name).toLowerCase());
    s.questions += st.total;
    s.correct   += st.score;
    s.attempts  += 1;
  }

  const result = [];
  const now = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const dStr = getHKDateString(d);
    const s = map.get(dStr);
    result.push({
      date: dStr,
      label: `${d.getMonth() + 1}/${d.getDate()}`,
      activeStudents: s ? s.students.size : 0,
      totalQuestions: s ? s.questions : 0,
      attempts: s ? s.attempts : 0,
      accuracy: s && s.questions > 0 ? Math.round(s.correct / s.questions * 100) : 0
    });
  }
  return result;
}

/* 🆕 雙軸折線圖：左軸=活躍學生數，右軸=總答題數 */
const DailyTrendChart = memo(function DailyTrendChart({ data, height = 220 }) {
  const isDark = useDarkModeClass();
  if (!data || data.length === 0) {
    return <div className="text-center text-gray-400 dark:text-gray-500 py-8 text-sm">暫無數據</div>;
  }
  const C = isDark
    ? { grid: '#374151', text: '#9ca3af', students: '#34d399', questions: '#60a5fa', dotStroke: '#1f2937' }
    : { grid: '#e5e7eb', text: '#6b7280', students: '#10b981', questions: '#3b82f6', dotStroke: '#ffffff' };

  let maxS = 0, maxQ = 0;
  for (let i = 0; i < data.length; i++) {
    if (data[i].activeStudents > maxS) maxS = data[i].activeStudents;
    if (data[i].totalQuestions > maxQ) maxQ = data[i].totalQuestions;
  }
  maxS = Math.max(5, Math.ceil(maxS / 5) * 5);
  maxQ = Math.max(20, Math.ceil(maxQ / 20) * 20);

  const width = Math.max(520, data.length * 52);
  const pad = { top: 24, right: 56, bottom: 36, left: 44 };
  const innerW = width - pad.left - pad.right;
  const innerH = height - pad.top - pad.bottom;
  const xStep = data.length > 1 ? innerW / (data.length - 1) : 0;
  const getX  = (i) => data.length > 1 ? pad.left + i * xStep : pad.left + innerW / 2;
  const getY1 = (v) => pad.top + innerH * (1 - v / maxS);
  const getY2 = (v) => pad.top + innerH * (1 - v / maxQ);

  const sPath = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i).toFixed(1)} ${getY1(d.activeStudents).toFixed(1)}`).join(' ');
  const qPath = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i).toFixed(1)} ${getY2(d.totalQuestions).toFixed(1)}`).join(' ');
  const labelStep = Math.max(1, Math.ceil(data.length / 10));

  return (
    <div className="overflow-x-auto custom-scrollbar">
      <div className="flex items-center gap-4 text-xs mb-2 flex-wrap">
        <span className="flex items-center gap-1">
          <span className="inline-block w-3 h-3 rounded-full" style={{ background: C.students }}></span>
          <span className="text-gray-600 dark:text-gray-300">活躍學生數（左軸）</span>
        </span>
        <span className="flex items-center gap-1">
          <span className="inline-block w-3 h-3 rounded-full" style={{ background: C.questions }}></span>
          <span className="text-gray-600 dark:text-gray-300">總答題數（右軸）</span>
        </span>
      </div>
      <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ minWidth: '100%', display: 'block' }}>
        {[0, 0.25, 0.5, 0.75, 1].map(f => (
          <g key={f}>
            <line x1={pad.left} y1={pad.top + innerH * f} x2={width - pad.right} y2={pad.top + innerH * f}
                  stroke={C.grid} strokeWidth="1" strokeDasharray="2,3" />
            <text x={pad.left - 6} y={pad.top + innerH * f} textAnchor="end" dominantBaseline="middle"
                  fill={C.students} fontSize="10" fontWeight="700">{Math.round(maxS * (1 - f))}</text>
            <text x={width - pad.right + 6} y={pad.top + innerH * f} textAnchor="start" dominantBaseline="middle"
                  fill={C.questions} fontSize="10" fontWeight="700">{Math.round(maxQ * (1 - f))}</text>
          </g>
        ))}
        {data.map((d, i) => (i % labelStep === 0) && (
          <text key={`x-${i}`} x={getX(i)} y={height - pad.bottom + 16} textAnchor="middle" fill={C.text} fontSize="10">
            {d.label}
          </text>
        ))}
        <path d={qPath} fill="none" stroke={C.questions} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.85" />
        <path d={sPath} fill="none" stroke={C.students} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {data.map((d, i) => (
          <g key={`pt-${i}`}>
            <circle cx={getX(i)} cy={getY2(d.totalQuestions)} r="3" fill={C.questions}>
              <title>{d.date}：總答題 {d.totalQuestions}（{d.attempts} 局，平均 {d.accuracy}%）</title>
            </circle>
            <circle cx={getX(i)} cy={getY1(d.activeStudents)} r="4.5" fill={C.students} stroke={C.dotStroke} strokeWidth="1.5">
              <title>{d.date}：活躍 {d.activeStudents} 人</title>
            </circle>
          </g>
        ))}
      </svg>
    </div>
  );
});

          <div className={`mb-3 border rounded-xl p-3 transition-all ${settings.enableCore ? 'bg-white dark:bg-gray-800 border-indigo-200 dark:border-indigo-700 shadow-sm' : 'bg-gray-50 dark:bg-gray-800/50 border-gray-200 dark:border-gray-700'}`}>
            <label className="flex items-center justify-between cursor-pointer mb-2">
              <div className="flex items-center space-x-2">
                <input type="checkbox" checked={settings.enableCore}
                  onChange={(e) => setSettings({ ...settings, enableCore: e.target.checked })}
                  className="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600"/>
                <span className="font-bold text-gray-800 dark:text-gray-100">核心課題 (Core)</span>
              </div>
              <span className="text-xs bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-1 rounded-full">
                Ch.{CONFIG.CHAPTER_RANGE.start} - {CONFIG.CHAPTER_RANGE.end}
              </span>
            </label>

            <AnimatePresence>
              {settings.enableCore && (
                <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="overflow-hidden">
                  <div className="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700">
                    <div className="flex justify-between items-center mb-3">
                      <span className={`text-xs ${settings.selectedChapters.length < 1 ? 'text-red-500 dark:text-red-400 font-bold' : 'text-gray-500 dark:text-gray-400'}`}>
                        已選: {settings.selectedChapters.length} 課 (最少1課)
                      </span>
                      <div className="space-x-2">
                        <button onClick={() => setSettings(p => ({...p, selectedChapters: [...ALL_CHAPTERS]}))} className="text-xs text-indigo-600 dark:text-indigo-400 hover:underline">全選</button>
                        <span className="text-gray-300 dark:text-gray-600">|</span>
                        <button onClick={() => setSettings(p => ({...p, selectedChapters: []}))} className="text-xs text-gray-500 dark:text-gray-400 hover:underline">清空</button>
                      </div>
                    </div>
                    <div className="grid grid-cols-5 gap-1.5 max-h-32 overflow-y-auto pr-1 custom-scrollbar">
                      {ALL_CHAPTERS.map(num => (
                        <button key={num} onClick={() => toggleChapter(num)}
                          className={`text-xs py-1.5 rounded-md transition-all ${
                            settings.selectedChapters.includes(num)
                              ? 'bg-indigo-600 dark:bg-indigo-500 text-white shadow-md transform scale-105'
                              : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'
                          }`}>
                          Ch.{num}
                        </button>
                      ))}
                    </div>
                  </div>
                </motion.div>
              )}
            </AnimatePresence>
          </div>

          <div className={`mb-3 border rounded-xl p-3 transition-all ${settings.enableElective ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800 shadow-sm' : 'bg-gray-50 dark:bg-gray-800/50 border-gray-200 dark:border-gray-700'}`}>
            <label className="flex items-center justify-between cursor-pointer mb-2">
              <div className="flex items-center space-x-2">
                <input type="checkbox" checked={settings.enableElective}
                  onChange={(e) => setSettings({ ...settings, enableElective: e.target.checked })}
                  className="w-5 h-5 text-green-600 rounded focus:ring-green-500 dark:bg-gray-700 dark:border-gray-600"/>
                <span className="font-bold text-gray-800 dark:text-gray-100">選修單元 (Elective)</span>
              </div>
              <span className="text-xs bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300 px-2 py-1 rounded-full">
                {CONFIG.ELECTIVES.join(', ')}
              </span>
            </label>

            <AnimatePresence>
              {settings.enableElective && (
                <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="overflow-hidden">
                  <div className="mt-3 pt-3 border-t border-green-200/50 dark:border-green-800/50">
                    <div className="flex justify-between items-center mb-3">
                      <span className={`text-xs ${settings.selectedElectives.length < 1 ? 'text-red-500 dark:text-red-400 font-bold' : 'text-gray-500 dark:text-gray-400'}`}>
                        已選: {settings.selectedElectives.length} 個 (最少1個)
                      </span>
                    </div>
                    <div className="flex gap-2 flex-wrap">
                      {CONFIG.ELECTIVES.map(code => (
                        <button key={code} onClick={() => toggleElective(code)}
                          className={`text-sm py-2 px-4 rounded-md transition-all font-medium ${
                            settings.selectedElectives.includes(code)
                              ? 'bg-green-600 dark:bg-green-500 text-white shadow-md transform scale-105'
                              : 'bg-white dark:bg-gray-800 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 hover:bg-green-100 dark:hover:bg-gray-700'
                          }`}>
                          {code}
                        </button>
                      ))}
                    </div>
                  </div>
                </motion.div>
              )}
            </AnimatePresence>
          </div>
        </div>

        {questionLoadError && (
          <div className="mb-4 p-3 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-700 dark:text-red-300 flex items-center justify-between gap-2">
            <span><i className="fas fa-exclamation-triangle mr-1"></i>題庫載入失敗：{questionLoadError}</span>
            <button onClick={onReloadQuestions}
              className="flex-shrink-0 px-3 py-1 bg-red-100 dark:bg-red-900/50 hover:bg-red-200 dark:hover:bg-red-800 text-red-700 dark:text-red-200 rounded-full font-medium border border-red-300 dark:border-red-700">
              <i className="fas fa-rotate-right mr-1"></i>重試
            </button>
          </div>
        )}

        <div className="mb-3 text-right px-1">
          <span className="text-xs text-gray-400 dark:text-gray-500">
            {mcqCount === 0 && !questionLoadError
              ? <><i className="fas fa-spinner fa-spin mr-1"></i>雲端題庫載入中...</>
              : mcqCount === 0 && questionLoadError
                ? <span className="text-red-500">題庫載入失敗</span>
                : `總題庫: ${mcqCount} 題`}
          </span>
        </div>

        <div className="space-y-2">
          <button onClick={onStart} disabled={!canStart}
            className={`w-full font-bold py-3 px-6 rounded-xl shadow-lg transform transition-all flex items-center justify-center gap-2 ${
              canStart
                ? 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white hover:scale-[1.02] active:scale-[0.98]'
                : 'bg-gray-300 dark:bg-gray-700 text-gray-500 dark:text-gray-500 cursor-not-allowed'
            }`}>
            <span>{startBtnText}</span>
            {canStart && <i className="fas fa-arrow-right"></i>}
            {!questionPoolReady && userName && !questionLoadError && <i className="fas fa-spinner fa-spin"></i>}
          </button>

          <div className="grid grid-cols-2 gap-2">
            <button onClick={onShowLeaderboard}
              className="font-bold py-2.5 px-3 rounded-xl border-2 border-indigo-100 dark:border-indigo-800 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all flex items-center justify-center gap-1.5 text-sm">
              <i className="fas fa-trophy"></i>
              <span>排行榜</span>
            </button>
            {canShowStats ? (
              <button onClick={onShowStats}
                className="font-bold py-2.5 px-3 rounded-xl border-2 border-green-200 dark:border-green-800 text-green-600 dark:text-green-400 bg-green-50/50 dark:bg-green-900/20 hover:bg-green-100 dark:hover:bg-green-900/40 transition-all flex items-center justify-center gap-1.5 text-sm">
                <i className="fas fa-chart-line"></i>
                <span>學習統計</span>
              </button>
            ) : (
              <button disabled
                className="font-bold py-2.5 px-3 rounded-xl border-2 border-gray-100 dark:border-gray-700 text-gray-400 dark:text-gray-600 bg-gray-50 dark:bg-gray-800/50 text-sm flex items-center justify-center gap-1.5 cursor-not-allowed">
                <i className="fas fa-chart-line"></i>
                <span>學習統計</span>
              </button>
            )}
          </div>

          {isTeacherUser && (
            <button onClick={onShowTeacherStats}
              className="w-full font-bold py-2.5 px-6 rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white shadow-lg transition-all flex items-center justify-center gap-2 text-sm">
              <i className="fas fa-chalkboard-teacher"></i>
              <span>教師儀表板（班級統計）</span>
              <i className="fas fa-user-tie"></i>
            </button>
          )}

          {/* 🆕 任務管理按鈕（老師專用） */}
          {isTeacherUser && (
            <button onClick={onShowAssignmentAdmin}
              className="w-full font-bold py-2.5 px-6 rounded-xl bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white shadow-lg transition-all flex items-center justify-center gap-2 text-sm">
              <i className="fas fa-paper-plane"></i>
              <span>任務管理（建立任務 / 查看成績單）</span>
              <i className="fas fa-clipboard-list"></i>
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function FlashCard({
  data, onSubmit, currentIndex, totalCount, startTime,
  mySkipCards = 0, onUseSkipCard,
  isWrongBookMode = false, wrongBookStreak = 0, onExitWrongBook,
  isSpeedrun = false, speedrunRemainingMs = 0,
  speedrunTargetCorrect = 0, speedrunCurrentCorrect = 0,
  activeAssignmentTitle = ''
}) {
  const toast = useToast();
  const [showAnswer, setShowAnswer] = useState(false);
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [isAnswerCorrect, setIsAnswerCorrect] = useState(null);
  const [isLightboxOpen, setIsLightboxOpen] = useState(false);

  const [imgRefreshKey, setImgRefreshKey] = useState(0);
  const [isRefreshSpinning, setIsRefreshSpinning] = useState(false);

  const shuffledData = useMemo(() => {
    if (!data) return [];
    const opts = resolveOptions(data);
    if (opts.length === 0) return [];
    return shuffleArray(opts.map((opt, i) => ({ text: opt, origIdx: i, img: data[`opt_${i}_img`] })));
  }, [data, currentIndex]);

  useEffect(() => {
    setShowAnswer(false);
    setSelectedIdx(null);
    setIsAnswerCorrect(null);
    setImgRefreshKey(0);
  }, [currentIndex, data]);

  const handleOptionClick = useCallback((idx, item) => {
    if (showAnswer) return;
    setSelectedIdx(idx);
    setShowAnswer(true);
    const isCorrect = item.origIdx === resolveCorrectIndex(data.correctIndex);
    setIsAnswerCorrect(isCorrect);
    onSubmit(isCorrect, item.text, item.origIdx);
  }, [showAnswer, data, onSubmit]);

  useEffect(() => {
    const onKey = (e) => {
      if (showAnswer || !shuffledData.length) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      const letterIdx = ['a','b','c','d','e','f'].indexOf(e.key.toLowerCase());
      const numIdx = ['1','2','3','4','5','6'].indexOf(e.key);
      const idx = letterIdx >= 0 ? letterIdx : numIdx;
      if (idx >= 0 && idx < shuffledData.length) {
        e.preventDefault();
        handleOptionClick(idx, shuffledData[idx]);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [showAnswer, shuffledData, handleOptionClick]);

  const handleRefreshImages = useCallback(() => {
    const urls = collectImageUrls(data);
    if (urls.length === 0) {
      toast("本題沒有圖片可以刷新", "info", 2000);
      return;
    }
    for (let i = 0; i < urls.length; i++) evictImageCache(urls[i]);
    setImgRefreshKey(k => k + 1);
    setIsRefreshSpinning(true);
    setTimeout(() => setIsRefreshSpinning(false), 600);
    toast(`已重新載入 ${urls.length} 張圖片`, "success", 2000);
  }, [data, toast]);

  if (!data) return <div className="text-center p-10 text-gray-700 dark:text-gray-200">載入題目中...</div>;

// 🆕 題目資料殘缺（缺 correctIndex 或選項太少）→ 顯示明確錯誤，並提示用戶
const questionBroken = !isQuestionComplete(data);
if (shuffledData.length === 0 || questionBroken) return (
    <div className="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl w-full text-center">
      <i className="fas fa-exclamation-triangle text-yellow-500 text-3xl mb-3"></i>
      <p className="text-gray-700 dark:text-gray-200 font-bold">此題資料異常，無法載入</p>
      <p className="text-gray-400 dark:text-gray-500 text-sm mt-1 mb-4">
        {questionBroken
          ? '題目缺少正確答案欄位（可能是雲端同步殘缺）。'
          : '無法解析選項。'}
        <br />
        建議從錯題簿中移除此題並重新練習收集。
      </p>
      <button
        onClick={() => onSubmit(false, '(題目資料異常，自動跳過)', null)}
        className="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm">
        <i className="fas fa-forward mr-1"></i>跳過此題
      </button>
    </div>
);

  const hasOptionImages = shuffledData.some(item => item.img);
  const questionText    = data.title || data.question || "";
  const categoryText    = data.category || "生物練習";
  const hasAnyImage     = collectImageUrls(data).length > 0;

  return (
    <div className="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-xl w-full relative overflow-hidden transition-colors">
      <QuestionProgressBar current={currentIndex + 1} total={totalCount} />

      {isWrongBookMode && (
        <div className="mb-3 p-2 bg-gradient-to-r from-red-50 to-pink-50 dark:from-red-900/30 dark:to-pink-900/30 border border-red-200 dark:border-red-800 rounded-lg flex items-center justify-between text-xs">
          <span className="text-red-700 dark:text-red-300 font-bold flex items-center gap-1">
            <i className="fas fa-book-bookmark"></i> 錯題簿複習模式
          </span>
          <div className="flex items-center gap-2">
            <span className="text-red-600 dark:text-red-400">
              本題進度: {wrongBookStreak}/{CONFIG.WRONG_BOOK_MASTERY_THRESHOLD}
              <span className="ml-1">{'⭐'.repeat(wrongBookStreak)}{'☆'.repeat(Math.max(0, CONFIG.WRONG_BOOK_MASTERY_THRESHOLD - wrongBookStreak))}</span>
            </span>
            <button
              onClick={onExitWrongBook}
              className="flex items-center gap-1 bg-white dark:bg-gray-700 hover:bg-red-50 dark:hover:bg-red-900/40 text-red-500 dark:text-red-400 border border-red-200 dark:border-red-700 px-2 py-1 rounded-lg transition-colors font-bold">
              <i className="fas fa-door-open text-[10px]"></i>
              <span>退出</span>
            </button>
          </div>
        </div>
      )}

      {/* 🆕 限時任務橫幅（倒數計時 + 目標進度） */}
      {isSpeedrun && (() => {
        const totalSec = Math.ceil(speedrunRemainingMs / 1000);
        const mm = Math.floor(totalSec / 60);
        const ss = totalSec % 60;
        const isUrgent = totalSec <= 30;
        const progress = speedrunTargetCorrect > 0
          ? Math.min(100, Math.round(speedrunCurrentCorrect / speedrunTargetCorrect * 100))
          : 0;
        const reached = speedrunCurrentCorrect >= speedrunTargetCorrect;

        return (
          <div className={`mb-3 p-3 rounded-xl border-2 ${
            reached
              ? 'bg-gradient-to-r from-green-50 to-emerald-50 dark:from-green-900/30 dark:to-emerald-900/30 border-green-300 dark:border-green-700'
              : isUrgent
                ? 'bg-gradient-to-r from-red-50 to-orange-50 dark:from-red-900/30 dark:to-orange-900/30 border-red-300 dark:border-red-700 animate-pulse'
                : 'bg-gradient-to-r from-rose-50 to-pink-50 dark:from-rose-900/20 dark:to-pink-900/20 border-rose-300 dark:border-rose-700'
          }`}>
            <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
              <span className="font-bold text-rose-700 dark:text-rose-300 flex items-center gap-1.5 text-sm">
                <i className="fas fa-stopwatch"></i>
                限時任務
                {activeAssignmentTitle && (
                  <span className="text-xs font-normal text-gray-600 dark:text-gray-400">
                    · {activeAssignmentTitle}
                  </span>
                )}
              </span>
              <div className={`font-mono font-bold text-2xl ${
                isUrgent ? 'text-red-600 dark:text-red-400' : 'text-rose-700 dark:text-rose-300'
              }`}>
                <i className="fas fa-clock mr-1 text-base"></i>
                {String(mm).padStart(2, '0')}:{String(ss).padStart(2, '0')}
              </div>
            </div>

            <div className="flex items-center justify-between text-xs mb-1.5">
              <span className="font-bold text-gray-700 dark:text-gray-200">
                <i className="fas fa-bullseye mr-1 text-rose-500"></i>
                答對進度：
                <span className={`ml-1 font-mono ${reached ? 'text-green-600 dark:text-green-400' : 'text-rose-600 dark:text-rose-400'}`}>
                  {speedrunCurrentCorrect} / {speedrunTargetCorrect}
                </span>
                {reached && <span className="ml-2 text-green-600 dark:text-green-400">✅ 已達標！</span>}
              </span>
              <span className="text-gray-500 dark:text-gray-400 font-mono">{progress}%</span>
            </div>

            <div className="w-full bg-white dark:bg-gray-800 rounded-full h-2 overflow-hidden border border-rose-200 dark:border-rose-800">
              <div
                className={`h-full rounded-full transition-all duration-500 ${
                  reached
                    ? 'bg-gradient-to-r from-green-400 to-emerald-500'
                    : 'bg-gradient-to-r from-rose-400 to-pink-500'
                }`}
                style={{ width: `${progress}%` }}>
              </div>
            </div>
          </div>
        );
      })()}

      <div className="flex justify-between items-center mb-4 border-b border-gray-100 dark:border-gray-700 pb-3 gap-2">
        <span className="px-2 py-1 bg-blue-50 dark:bg-blue-900/50 text-blue-600 dark:text-blue-300 rounded text-[10px] font-bold uppercase tracking-wider flex-shrink-0">
          {categoryText}
        </span>
        <div className="flex items-center gap-2 flex-shrink-0">
          {hasAnyImage && (
            <button
              onClick={handleRefreshImages}
              title="重新載入本題所有圖片"
              className="flex items-center gap-1 bg-indigo-50 dark:bg-indigo-900/40 hover:bg-indigo-100 dark:hover:bg-indigo-900/60 text-indigo-600 dark:text-indigo-300 px-2.5 py-1 rounded-full text-xs font-medium border border-indigo-200 dark:border-indigo-700 transition-colors">
              <i className={`fas fa-sync-alt ${isRefreshSpinning ? 'spin-once' : ''}`}></i>
              <span className="hidden sm:inline">刷新圖片</span>
            </button>
          )}
          <GameTimer startTime={startTime} />
        </div>
        <span className="text-gray-400 dark:text-gray-500 text-xs font-medium flex-shrink-0">{currentIndex + 1} / {totalCount}</span>
      </div>

      <div className="landscape:grid landscape:grid-cols-5 landscape:gap-5">
        <div className="landscape:col-span-2">
          <h3 className="text-lg font-bold text-gray-800 dark:text-gray-100 leading-snug mb-4 whitespace-pre-line break-words">
            {formatText(questionText)}
          </h3>
          {data.question_img && (
            <div className="mb-5 flex justify-center bg-gray-50 dark:bg-gray-700 rounded-xl p-2 border border-gray-100 dark:border-gray-600">
              <LoadingImage
                src={data.question_img}
                onClick={() => setIsLightboxOpen(true)}
                className={`w-auto rounded shadow-sm object-contain cursor-zoom-in hover:opacity-80 transition-opacity ${hasOptionImages ? 'max-h-40' : 'max-h-60'} landscape:max-h-48`}
                alt="Question"
                minHeight="min-h-[120px]"
                refreshKey={imgRefreshKey}
              />
            </div>
          )}
        </div>

        <div className="landscape:col-span-3">
          <div className={`grid gap-3 mb-4 ${hasOptionImages ? 'grid-cols-2' : 'grid-cols-1'}`}>
            {shuffledData.map((item, idx) => {
              const isSelected = idx === selectedIdx;
              let cls = "border-gray-100 dark:border-gray-600 hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30";
              if (showAnswer) {
                if (isSelected && isAnswerCorrect) {
                  cls = "border-green-500 bg-green-50 dark:bg-green-900/40 ring-2 ring-green-200 dark:ring-green-700";
                } else if (isSelected && !isAnswerCorrect) {
                  cls = "border-red-400 bg-red-50 dark:bg-red-900/40 ring-2 ring-red-200 dark:ring-red-700";
                } else {
                  cls = "border-gray-100 dark:border-gray-700 opacity-40";
                }
              }
              return (
                <button key={`${currentIndex}-${idx}`} disabled={showAnswer}
                  onClick={(e) => {
                    e.currentTarget.blur();
                    handleOptionClick(idx, item);
                  }}
                  className={`text-left p-3 rounded-xl border-2 transition-all flex flex-col items-center justify-center ${cls}`}>
                  <div className="flex items-start w-full mb-1 text-left">
                    <span className="w-5 h-5 rounded-full border border-gray-300 dark:border-gray-500 flex items-center justify-center mr-2 mt-0.5 text-[10px] font-black shrink-0 dark:text-gray-200">
                      {String.fromCharCode(65 + idx)}
                    </span>
                    <span className="text-sm text-gray-700 dark:text-gray-200 break-words whitespace-pre-line">
                      {formatText(item.text)}
                    </span>
                  </div>
                  {item.img && (
                    <div className="mt-1 w-full flex justify-center bg-white dark:bg-gray-100 rounded p-1">
                      <LoadingImage
                        src={item.img}
                        className="max-h-24 md:max-h-32 object-contain"
                        alt="Option"
                        minHeight="min-h-[80px]"
                        refreshKey={imgRefreshKey}
                      />
                    </div>
                  )}
                </button>
              );
            })}
          </div>

          <div className="hidden md:block text-center text-xs text-gray-400 dark:text-gray-500 mb-2">
            💡 小提示：按 <kbd className="px-1 bg-gray-100 dark:bg-gray-700 rounded">A</kbd>/<kbd className="px-1 bg-gray-100 dark:bg-gray-700 rounded">B</kbd>/<kbd className="px-1 bg-gray-100 dark:bg-gray-700 rounded">C</kbd>/<kbd className="px-1 bg-gray-100 dark:bg-gray-700 rounded">D</kbd> 或 <kbd className="px-1 bg-gray-100 dark:bg-gray-700 rounded">1-4</kbd> 可快速作答
          </div>
        </div>
      </div>

      {mySkipCards > 0 && !showAnswer && !isWrongBookMode && (
        <button onClick={onUseSkipCard} className="mt-4 w-full py-2 bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-300 rounded-lg text-xs font-bold border border-purple-200 dark:border-purple-800">
          使用跳題卡 (剩餘 {mySkipCards})
        </button>
      )}

      <ImageLightbox src={data.question_img} isOpen={isLightboxOpen} onClose={() => setIsLightboxOpen(false)} />
    </div>
  );
}

function LeaderboardScreen({ onBack, leaderboardData, userName, loadingRank }) {
